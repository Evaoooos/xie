<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>春深锁玉堂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{touch-action:manipulation;-webkit-text-size-adjust:100%}
:root{
  --bg:#15110c; --bg-card:rgba(40,32,22,.5); --bg-elev:rgba(58,46,30,.42);
  --ink:#e9ddc1; --ink-soft:#bdac88; --ink-dim:#7a6e58; --ink-faint:#4d4538;
  --gold:#d8af62; --gold-bright:#f1cd80; --gold-dim:#917646;
  --crimson:#c8503f; --crimson-dim:#8a3528; --jade:#957b9c; --jade-dim:#4f7060;
  --line:rgba(216,175,98,.16); --line-bright:rgba(216,175,98,.34);
  --font-body:'LXGW WenKai','Noto Serif SC','Songti SC','STSong',serif;
  --font-title:'Noto Serif SC','Songti SC','STSong',serif;
  --font-ui:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
}
body{
  font-family:var(--font-body); background:var(--bg); color:var(--ink);
  min-height:100vh; overflow-x:hidden; position:relative; line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 760px 560px at 12% -5%,rgba(200,80,63,.055),transparent 60%),
    radial-gradient(ellipse 680px 480px at 88% 28%,rgba(216,175,98,.07),transparent 60%),
    radial-gradient(ellipse 600px 760px at 50% 105%,rgba(132,171,146,.035),transparent 60%)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:radial-gradient(circle at 25% 25%,rgba(216,175,98,.035) 0,transparent 1px);
  background-size:30px 30px}
.app{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:20px 24px 44px}
/* 顶部 */
.head{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:20px;margin-bottom:18px;position:relative;border-bottom:1px solid var(--line)}
.head::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim) 30%,var(--gold-dim) 70%,transparent);opacity:.5}
.title-wrap{display:flex;align-items:center;gap:14px}
.seal{width:38px;height:38px;border:1.5px solid var(--crimson);border-radius:3px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(200,80,63,.06);position:relative}
.seal span{font-family:var(--font-title);font-weight:700;font-size:13px;color:var(--crimson);
  line-height:1;letter-spacing:-1px;writing-mode:vertical-rl;text-orientation:upright}
.head h1{font-family:var(--font-title);font-size:27px;font-weight:700;letter-spacing:.32em;
  background:linear-gradient(160deg,#f4d28a 0%,#d8af62 45%,#a07e44 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.head-r{display:flex;gap:9px}
.btn-mini{font-family:var(--font-ui);background:transparent;border:1px solid var(--line-bright);
  color:var(--ink-soft);padding:7px 16px;font-size:12px;letter-spacing:.22em;cursor:pointer;
  transition:all .25s;border-radius:2px}
.btn-mini:hover{border-color:var(--gold);color:var(--gold-bright);background:rgba(216,175,98,.07)}
.btn-mini.danger:hover{border-color:var(--crimson);color:var(--crimson);background:rgba(200,80,63,.07)}
/* 数值条 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
.stat{background:var(--bg-card);border:1px solid var(--line);padding:12px 16px;
  border-radius:3px;backdrop-filter:blur(8px);position:relative;
  display:flex;flex-direction:column;justify-content:center;min-height:62px}
.stat::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:2px;
  background:var(--gold-dim);border-radius:2px}
.stat.s2::before{background:var(--gold)}
.stat.s3::before{background:var(--jade)}
.stat.s4::before{background:var(--crimson-dim)}
.stat .lbl{font-family:var(--font-ui);font-size:10px;color:var(--ink-dim);
  letter-spacing:.34em;margin-bottom:4px}
.stat .row{display:flex;align-items:baseline;gap:8px}
.stat .val{font-family:var(--font-ui);font-size:19px;color:var(--ink);font-weight:500;letter-spacing:.02em}
.stat.s2 .val{color:var(--gold-bright)}
.stat .rate{font-family:var(--font-ui);font-size:10.5px;color:var(--jade-dim);letter-spacing:.04em}
.stat .state{font-family:var(--font-body);font-size:15px;color:var(--ink);letter-spacing:.16em}
.stat .state.w2{color:var(--ink-soft)}
.stat .state.w3{color:var(--gold)}
.stat .state.w4{color:var(--crimson)}
/* 等级栏 */
.level-bar{background:var(--bg-card);border:1px solid var(--line);padding:16px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;border-radius:3px;
  margin-bottom:13px;backdrop-filter:blur(8px)}
.level-bar .lv-nm{font-family:var(--font-title);font-size:19px;color:var(--ink);
  letter-spacing:.26em;font-weight:500}
.level-bar .lv-desc{font-family:var(--font-body);font-size:12px;color:var(--ink-dim);
  letter-spacing:.14em;margin-top:5px}
.lv-up{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.btn{font-family:var(--font-ui);
  background:linear-gradient(150deg,rgba(216,175,98,.16),rgba(216,175,98,.05));
  border:1px solid var(--gold-dim);color:var(--gold-bright);
  padding:8px 24px;font-size:13px;letter-spacing:.3em;cursor:pointer;
  transition:all .25s;border-radius:2px;white-space:nowrap}
.btn:hover:not(:disabled){background:linear-gradient(150deg,rgba(216,175,98,.26),rgba(216,175,98,.12));
  border-color:var(--gold);box-shadow:0 0 14px rgba(216,175,98,.16)}
.btn:disabled{color:var(--ink-faint);border-color:var(--ink-faint);cursor:not-allowed;
  background:transparent}
.lv-cost{font-family:var(--font-ui);font-size:11px;color:var(--ink-dim);letter-spacing:.1em}
/* 标记 */
.flags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.tag{font-family:var(--font-ui);display:inline-flex;align-items:center;padding:4px 13px;
  background:rgba(200,80,63,.07);border:1px solid rgba(200,80,63,.28);
  font-size:11px;color:var(--ink-soft);letter-spacing:.16em;border-radius:2px}
.tag::before{content:"";width:4px;height:4px;background:var(--crimson);
  border-radius:50%;margin-right:7px;flex-shrink:0}
/* 主体 */
.body{display:grid;grid-template-columns:1.12fr 1fr;gap:15px;align-items:start}
.col{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
  min-height:0;
}

.col-l .panel{
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
}
.panel{background:var(--bg-card);border:1px solid var(--line);border-radius:3px;
  padding:15px 17px;backdrop-filter:blur(8px)}
.panel-title{font-family:var(--font-ui);font-size:11px;color:var(--ink-dim);
  letter-spacing:.5em;text-align:center;padding-bottom:11px;
  border-bottom:1px solid var(--line);margin-bottom:13px}
.panel-title::before,.panel-title::after{content:"";display:inline-block;width:22px;height:1px;
  background:var(--gold-dim);vertical-align:middle;margin:0 13px;opacity:.5}
.log{flex:1;min-height:0;overflow-y:auto;font-size:14px;line-height:1.95;padding-right:5px}
.log::-webkit-scrollbar{display:none}
.log{-ms-overflow-style:none;scrollbar-width:none}
.log-line{padding:5px 9px;color:var(--ink-soft);animation:fadein .5s;
  border-left:2px solid transparent}
.log-line.t-gain{color:var(--gold);border-left-color:rgba(216,175,98,.3)}
/*.log-line.t-man{color:var(--jade);border-left-color:rgba(132,171,146,.3)}*/
.log-line.t-man{color:var(--jade);border-left-color:#957b9c}
.log-line.t-crisis{color:var(--crimson);border-left-color:rgba(200,80,63,.4)}
.log-line.t-flag{color:var(--gold-bright);background:rgba(216,175,98,.05);
  border-left-color:var(--crimson)}
.log-line.t-end{color:var(--gold-bright);text-align:center;background:rgba(216,175,98,.07);
  border:1px solid var(--line);border-radius:2px;padding:8px;letter-spacing:.36em;
  font-family:var(--font-title)}
.log,
.panel,
.body,
.app{
  overflow-anchor: none;
}
@keyframes fadein{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
/* 主操作 */
.main-acts{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btn-act{font-family:var(--font-ui);padding:13px 0;font-size:14px;letter-spacing:.4em;
  cursor:pointer;border-radius:3px;transition:all .25s;border:1px solid}
.btn-act.zs{background:linear-gradient(155deg,rgba(216,175,98,.14),rgba(216,175,98,.04));
  border-color:var(--gold-dim);color:var(--gold-bright)}
.btn-act.zs:hover{background:linear-gradient(155deg,rgba(216,175,98,.24),rgba(216,175,98,.1));
  border-color:var(--gold);box-shadow:0 0 14px rgba(216,175,98,.14)}
.btn-act.yj{background:linear-gradient(155deg,rgba(200,80,63,.13),rgba(200,80,63,.03));
  border-color:var(--crimson-dim);color:var(--crimson)}
.btn-act.yj:hover{background:linear-gradient(155deg,rgba(200,80,63,.22),rgba(200,80,63,.08));
  border-color:var(--crimson);box-shadow:0 0 14px rgba(200,80,63,.13)}
.btn-act .sub{display:block;font-size:10px;letter-spacing:.1em;color:var(--ink-dim);
  margin-top:3px;font-weight:300}
/* Tab */
.tabs{display:none;margin-bottom:11px;border-bottom:1px solid var(--line)}
.tab{font-family:var(--font-ui);flex:1;background:transparent;border:none;color:var(--ink-dim);
  padding:11px;font-size:13px;letter-spacing:.4em;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .25s}
.tab.active{color:var(--gold-bright);border-bottom-color:var(--gold)}
/* 人物 */
.men{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.man{background:var(--bg-elev);border:1px solid var(--line);padding:12px 13px;
  border-radius:3px;position:relative;cursor:pointer;transition:all .25s;
  display:flex;flex-direction:column;gap:6px}
.man:hover{border-color:var(--gold-dim);background:rgba(58,46,30,.58)}
.man.locked{opacity:.55}
.man.locked .nm{color:var(--ink-dim);letter-spacing:.6em}
.man.full{border-color:var(--gold);box-shadow:inset 0 0 13px rgba(216,175,98,.08)}
.man.yf{border-color:var(--crimson-dim);background:rgba(58,40,30,.4)}
.man.yf:hover{border-color:var(--crimson);background:rgba(64,42,32,.5)}
.man .nm{font-family:var(--font-title);font-size:15px;color:var(--ink);
  letter-spacing:.2em;font-weight:500}
.man.full .nm,.man.yf .nm{color:var(--gold-bright)}
.man .tags{font-family:var(--font-ui);font-size:10.5px;color:var(--ink-dim);letter-spacing:.14em}
.man .ph{font-family:var(--font-ui);font-size:11px;color:var(--gold);letter-spacing:.18em}
.man.yf .ph{color:var(--crimson)}
.man .pb{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.man .pb-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--gold));transition:width .4s}
.man.full .pb-fill{background:var(--gold)}
.man .bonus{font-family:var(--font-ui);font-size:10px;color:var(--gold-dim);letter-spacing:.08em}
.man .act{margin-top:2px}
.man .act .btn{width:100%;font-size:11px;padding:6px;letter-spacing:.18em}
/* 家业 */
.yes{display:flex;flex-direction:column;gap:9px}
.ye{background:var(--bg-elev);border:1px solid var(--line);padding:11px 13px;
  border-radius:3px;display:flex;justify-content:space-between;align-items:center;gap:11px}
.ye-info{flex:1;min-width:0}
.ye .nm{font-family:var(--font-title);font-size:13.5px;color:var(--ink);
  letter-spacing:.14em;font-weight:500}
.ye .nm .ct{font-family:var(--font-ui);color:var(--gold);font-size:11px;margin-left:7px}
.ye .ds{font-family:var(--font-body);font-size:11px;color:var(--ink-dim);
  margin-top:3px;letter-spacing:.04em}
.ye .ds .yi{font-family:var(--font-ui);color:var(--jade-dim);margin-right:9px}
.ye .btn{padding:6px 14px;font-size:11px;letter-spacing:.14em;flex-shrink:0}
.ye.locked{opacity:.38}
.ye.locked .btn{display:none}
.ye-lock{font-family:var(--font-ui);font-size:11px;color:var(--ink-faint);letter-spacing:.2em}
/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(13,10,7,.8);z-index:100;display:none;
  align-items:center;justify-content:center;padding:22px;backdrop-filter:blur(6px)}
.modal.show{display:flex;animation:fadein .25s}
.modal-card{background:linear-gradient(180deg,#1e1812 0%,#15110c 100%);
  border:1px solid var(--gold-dim);max-width:540px;width:100%;max-height:88vh;
  overflow-y:auto;padding:30px 34px;position:relative;border-radius:3px;
  box-shadow:0 24px 64px rgba(0,0,0,.7),0 0 56px rgba(200,80,63,.07)}
.modal-card::-webkit-scrollbar{display:none}
.modal-card{scrollbar-width:none}
.modal-title{font-family:var(--font-title);font-size:18px;letter-spacing:.42em;
  color:var(--gold-bright);text-align:center;padding-bottom:15px;margin-bottom:19px;
  font-weight:700;position:relative}
.modal-title::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:56%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.modal-desc{font-size:14.5px;line-height:2.05;color:var(--ink);margin-bottom:21px;
  text-indent:2em;letter-spacing:.04em}
.modal-opts{display:flex;flex-direction:column;gap:9px}
.opt{font-family:var(--font-body);background:rgba(216,175,98,.045);border:1px solid var(--line);
  padding:12px 17px;cursor:pointer;font-size:13.5px;color:var(--ink);text-align:left;
  letter-spacing:.03em;transition:all .25s;line-height:1.6;border-radius:2px}
.opt:hover:not(:disabled){background:rgba(216,175,98,.11);border-color:var(--gold-dim);
  transform:translateX(3px)}
.opt:disabled{color:var(--ink-dim);cursor:not-allowed;opacity:.5}
.opt .ol{font-family:var(--font-title);font-weight:500;letter-spacing:.18em;display:block;
  margin-bottom:3px;color:var(--gold)}
.opt:disabled .ol{color:var(--ink-dim)}
.opt .od{font-size:11.5px;color:var(--ink-soft);letter-spacing:.03em}
.opt-close{margin-top:16px;text-align:center}
/* 角色卡 */
.mc .nm-big{font-family:var(--font-title);font-size:23px;color:var(--gold-bright);
  letter-spacing:.28em;text-align:center;margin-bottom:7px;font-weight:700}
.mc .tag-line{font-family:var(--font-ui);text-align:center;color:var(--jade);font-size:12px;
  letter-spacing:.2em;margin-bottom:16px}
.mc .ph-now{font-family:var(--font-ui);text-align:center;font-size:11px;color:var(--crimson);
  letter-spacing:.26em;margin-bottom:14px}
.mc .ds-text{font-size:14px;line-height:2.1;color:var(--ink);text-indent:2em;
  letter-spacing:.04em;padding:15px 0;border-top:1px solid var(--line);
  border-bottom:1px solid var(--line)}
.mc .ds-faint{font-size:13px;line-height:2;color:var(--ink-dim);text-indent:2em;
  letter-spacing:.04em;margin-top:13px}
/* 成就 */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach{padding:11px 13px;background:rgba(58,46,30,.4);border:1px solid var(--line);
  border-radius:2px;border-left:2px solid var(--gold-dim)}
.ach.locked{opacity:.5;border-left-color:var(--ink-faint)}
.ach .an{font-family:var(--font-title);font-size:13px;color:var(--gold);
  letter-spacing:.12em;margin-bottom:3px;font-weight:500}
.ach.locked .an{color:var(--ink-dim);letter-spacing:.3em}
.ach .ad{font-family:var(--font-body);font-size:11px;color:var(--ink-soft);line-height:1.55}
.ach.locked .ad{color:var(--ink-faint)}
/* 结局 */
.ending{position:fixed;inset:0;z-index:200;display:none;
  background:radial-gradient(ellipse at center,#1a140d 0%,#0d0805 100%);
  align-items:center;justify-content:center;padding:26px;overflow-y:auto}
.ending.show{display:flex;animation:fadein .8s}
.ending-card{max-width:620px;width:100%;padding:38px 38px 30px;
  background:linear-gradient(180deg,#1e1812 0%,#15110c 100%);
  border:1px solid;max-height:92vh;overflow-y:auto;position:relative;border-radius:3px}
.ending-card::-webkit-scrollbar{display:none}
.ending-card{scrollbar-width:none}
.ending-card.good{border-color:var(--gold);box-shadow:0 0 76px rgba(216,175,98,.13)}
.ending-card.bad{border-color:var(--crimson-dim);box-shadow:0 0 76px rgba(200,80,63,.1)}
.ending-card.free{border-color:var(--jade);box-shadow:0 0 76px rgba(132,171,146,.11)}
.ending-title{font-family:var(--font-title);font-size:31px;text-align:center;
  letter-spacing:.45em;margin-bottom:9px;font-weight:700}
.ending-card.good .ending-title{color:var(--gold-bright)}
.ending-card.bad .ending-title{color:var(--crimson)}
.ending-card.free .ending-title{color:var(--jade)}
.ending-sub{font-family:var(--font-ui);text-align:center;font-size:12px;letter-spacing:.55em;
  color:var(--ink-dim);margin-bottom:25px}
.ending-text{font-size:14.5px;line-height:2.15;text-indent:2em;letter-spacing:.05em;
  color:var(--ink);padding:21px 0;border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);margin-bottom:19px}
.ending-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-family:var(--font-ui);
  font-size:12px;color:var(--ink-soft);margin-bottom:19px;letter-spacing:.08em}
.ending-stats div{padding:4px 7px;background:rgba(58,46,30,.3);border-left:2px solid var(--gold-dim)}
.ending-ach-title{font-family:var(--font-ui);font-size:11px;color:var(--gold);text-align:center;
  letter-spacing:.5em;margin-bottom:13px}
.ending-ach{display:grid;grid-template-columns:1fr 1fr;gap:7px 15px;font-size:11px;margin-bottom:25px}
.ending-ach .a .an{font-family:var(--font-title);color:var(--gold);font-size:12px;letter-spacing:.12em}
.ending-ach .a .ad{font-family:var(--font-body);color:var(--ink-soft);font-size:10px}
.ending-ach .a.locked .an{color:var(--ink-dim)}
.ending-ach .a.locked .ad{color:var(--ink-faint)}
.ending-btns{text-align:center}
.wm{position:fixed;bottom:9px;right:15px;font-family:var(--font-ui);font-size:9px;
  color:var(--ink-dim);letter-spacing:.3em;opacity:.4;z-index:50;pointer-events:none}
.wm-in{font-family:var(--font-ui);text-align:center;font-size:9px;color:var(--ink-dim);
  letter-spacing:.4em;margin-top:15px;opacity:.5}
@media(max-width:768px){
  .app{padding:15px 14px 30px}
  .head h1{font-size:21px;letter-spacing:.24em}
  .seal{width:32px;height:32px}.seal span{font-size:11px}
  .btn-mini{padding:6px 11px;font-size:11px;letter-spacing:.16em}
  .stats{grid-template-columns:repeat(2,1fr);gap:9px}
  .stat{padding:10px 13px;min-height:56px}
  .stat .val{font-size:17px}
  .body{grid-template-columns:1fr;gap:11px}
  .col-l .panel{flex:none}
  .log{flex:none;height:270px;min-height:0}
  .tabs{display:flex}
  .col-r .panel-title{display:none}
  .col-r [data-panel]{display:none}
  .col-r [data-panel].active{display:block}
  .men{grid-template-columns:1fr 1fr;gap:9px}
  .modal-card{padding:24px 21px}
  .modal-desc{font-size:13.5px;line-height:1.95}
  .ending-card{padding:28px 23px}
  .ending-title{font-size:23px;letter-spacing:.32em}
  .ending-text{font-size:13.5px;line-height:2}
  .ach-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div class="title-wrap">
      <div class="seal"><span>玉堂</span></div>
      <h1>春深锁玉堂</h1>
    </div>
    <div class="head-r">

他沉默许久，只说：我知道。','谢临舟不该在你院中久留。你知道，他也知道。可夜色太深，规矩像一张薄纸。'],'card':['谢家长子，先夫人所出。你坐的位置，本是他生母的。他对你这个继母没有半分敬意，也不掩饰。','你问谢临舟是不是还是不服。他沉默片刻，说：“夫人若做错，我自然不服。”你说：“那你最好盯紧些。”','那次族亲围攻，他站到了你这边。你没问为什么，他也没说。送你回院的次数，悄悄多了起来。','他终于开口唤你夫人。这一声你听得出来，不是礼数。']},{'id':'gu','nm':'顾行简','tag':'精明\x20·\x20散漫','unlock':0x3,'base':[{'w':0x0,'y':0x64,'sw':0x0,'sy':0x1},{'w':0x0,'y':0x258,'sw':0x0,'sy':0x6},{'w':0x0,'y':0xbb8,'sw':0x0,'sy':0xa}],'bonus':[null,'银钱\x20+3/秒','银钱\x20+10/秒','银钱\x20+30/秒'],'rate':[[0x0,0x0],[0x0,0x3],[0x0,0xa],[0x0,0x1e]],'ptxt':['商会少东家递了帖子，说想见谢夫人一面。','顾行简合上折扇，笑着说：谢夫人这笔账，算得比我狠。','顾行简替你拂去袖口墨痕，指尖停得太久：“你若不是谢家主母——”后半句没再说。','顾行简把半城商路摊到你案上。这个最会算计的人，在你这里，第一次算不清自己。'],'card':['商会少东家，船运行首。第一次来谢家，他看你的眼神像在看一桩快赔光的买卖。谢家风雨飘摇，年轻继妻掌权，怎么看都不是一笔好账。','三次谈账之后，他改口叫你谢夫人。他说你算账比他还狠，语气却不像抱怨。','他最会把越界藏在生意里。递契书时碰你的指尖，谈风险时靠近半寸，明明句句都在说利，偏偏让人听出一点不该有的热。','他终于做了一笔不划算的买卖。商会的体面、顾家的退路、半生精明，都被他一并压到你案前。他还是会笑，还是会算，只是从此每一笔账里，都先算你。']},{'id':'lu','nm':'陆怀瑾','tag':'隐忍\x20·\x20清正','unlock':0x4,'base':[{'w':0x32,'y':0x32,'sw':0.5,'sy':0.5},{'w':0x15e,'y':0x3e8,'sw':0x3,'sy':0x3},{'w':0x640,'y':0xbb8,'sw':0x5,'sy':0x5}],'bonus':[null,'威望\x20+3/秒\x20银钱\x20+1/秒','威望\x20+6/秒\x20银钱\x20+2/秒','威望\x20+10/秒\x20银钱\x20+4/秒'],'rate':[[0x0,0x0],[0x3,0x1],[0x6,0x2],[0xa,0x4]],'ptxt':['官差递来一份文书，落款是个你已经多年没敢念出口的名字。','官府文书送来得突然，陆怀瑾替你挡下第一句难听话。多年以前他没能护住你，如今连一句闲言都不肯让你先听。','你们隔着一盏灯坐着，谁都没提从前。可陆怀瑾看你的眼神，从未走远。','陆怀瑾终于没有再说带你走。他把官印压在案上，低声道：“我来迟过一次，不会再让你一个人应这一局。”'],'card':['你年少时的青梅竹马，如今有了官身。多年前你家出事，他没能护住你。','他替你挡下官府那封难听的文书时，仍唤了你旧名，出口才低声改成谢夫人。','一盏灯，两个人，谁都没提从前。可他看你的样子，那点东西十年都没散。','他不再执着于把你从谢家带走。因为如今的你已经不是当年那个被风浪卷走的姑娘。你要权，他递文书；你要查案，他担风险；你要留在这座宅子里，他便把自己迟来的这一生，押在你要走的路上。']}];vmw_4a9930['MEN']=MEN;globalThis['MEN']=vmw_4a9930['MEN'];vmw_4a9930['MEN']=MEN;globalThis['MEN']=MEN;delete vmw_4a9930['_$hrgVOG']['MEN'];const YEFU={'nm':'谢问璋','sub':'先\x20夫\x20·\x20已\x20故','know':['谢家老爷，谢问璋。原配早逝，多年未娶。在那场险些令你满门倾覆的朝堂死局中，他顶着半朝权臣的施压，以娶继室的名义，强行将你全家从鬼门关捞了回来。你嫁进谢家不到一月，他便病逝了。外人说他娶你是临终糊涂，只有你记得，他病中看人时，眼神一直很清醒。','账册边那行极淡的朱批是他的字。他病到那个时候，仍替你标出后面会踩的坑。他不是随手把谢家丢给你。他是知道你撑得起，也怕你独自撑得太疼。','药柜底层那张地契写着你的名字，落款是你过门前一日。在你还没坐稳主母位之前，他已经替你备好了一条可以离开的路。这个人似乎从一开始就没打算困住你。','老仆说，他临终只交代一句——她若想走，谁都不许拦；她若想留，这宅子从此是她的。你忽然想起他病中同你说话时，总把咳声压得很轻，好像怕你觉得自己嫁进来只是为了守一场死局。','那封信里没有一个“守”字，也没有一句要你替谢家赔上一生。他曾受过你母亲旧恩，也曾在你家倾覆时救你满门。可写到最后，他没有谈恩，也没有谈债。他只说：若你愿意，谢家听你；若你不愿，别回头。']};vmw_4a9930['YEFU']=YEFU;globalThis['YEFU']=vmw_4a9930['YEFU'];vmw_4a9930['YEFU']=YEFU;globalThis['YEFU']=YEFU;delete vmw_4a9930['_$hrgVOG']['YEFU'];const YES=[{'id':'xiu','nm':'绣坊','ul':0x1,'bp':0x50,'prod':0x1,'scale':1.35,'ds':'针线密织，旧绣坊的底子还在。','log':'旧绣坊重新点灯。几个绣娘在灯下低声说话，像是久违了。'},{'id':'mi','nm':'米铺','ul':0x2,'bp':0x12c,'prod':0x3,'scale':1.38,'ds':'灶上有米，人心才稳。','log':'米铺掌柜送来第一本清账。你看了半盏茶，点了头。'},{'id':'bu','nm':'布庄','ul':0x3,'bp':0x384,'prod':0x8,'scale':1.4,'ds':'谢家的门面，撑得起来。','log':'布庄开门那日，谢家的门面也算撑了起来。'},{'id':'cha','nm':'茶楼','ul':0x4,'bp':0x960,'prod':0x14,'scale':1.43,'ds':'卖茶，也卖人情。','log':'人情这东西泡在热水里，也能卖钱。'},{'id':'chuan','nm':'船行','ul':0x6,'bp':0x2ee0,'prod':0x6e,'scale':1.48,'ds':'货走水路，账走暗处。','log':'谢家的旗挂上去，风一吹，满江都是你的名字。'},{'id':'dang','nm':'当铺','ul':0x7,'bp':0x5dc0,'prod':0xdc,'scale':1.5,'ds':'最赚钱，也最难管。','log':'当铺最赚钱，也最难管。但你接过了，一句解释都没说。'}];vmw_4a9930['YES']=YES;globalThis['YES']=vmw_4a9930['YES'];vmw_4a9930['YES']=YES;globalThis['YES']=YES;delete vmw_4a9930['_$hrgVOG']['YES'];const RLOG={'ev':['你走过廊下，两个丫鬟的笑声立刻低了下去。','库房的锁换了一把新的。旧锁你没扔，压在案头当镇纸。','院中下人见你抬眼，已经知道该闭嘴了。这比什么规矩都管用。','族婶今日来得很早，点心是带了的，笑意比茶还淡。','老嬷嬷教你认各房的脸，话里藏话。你听着，没接。','夜里你算账算到灯花结了又落。嫁人前你没想过，主母也算半个苦命账房。','下人背后议论新主母年轻。声音不大不小，刚好够你听见。你也刚好记住了。','管事嬷嬷回话时只看地。你知道她不是怕你，是在算你能坐多久。','你今日没有训人，只让那犯错的小厮在廊下站了半日。','新来的小丫鬟喊你夫人，声音甜得像糖。','有人说你命好，嫁进谢家做主母。你看着账册，险些笑出声。','你今日第一次在正堂坐满一个时辰。下人站得腿酸，你心里也酸：谁让大家都上班呢。','有人说谢家气数尽了。你低头看账，觉得气数这种东西，有时候也能重新算。','账册乱，不代表家业空。乱账底下压着田庄、铺面、人情和多年旧名声。','你今日没有骂账房。你让他把十年前的总账搬出来。老账见光，许多人先慌了。','雨下了一整日。游廊里的穿堂风冷得刺骨，你拢紧了披风。','谢问璋的牌位前香烧到一半灭了。你重新点上，手很稳。你接了他的恩，就替他续这断了的香火。','长廊里一束目光始终随行，脚步声克制地停在三步之外。','夜半三更，你提着灯笼站在巨大的空院子里。春风料峭，这破败的百年世家就像个华丽的囚笼，连口活气都透不出来。','账房先生递账册时，袖口沾着新墨。你没说破，把那几页翻开，盯了他三秒。他把头低得更深了。','谢问璋的书还在书房。你去翻找了一回，没找到要的东西，却看见某页书边有一行批注：这处他们惯来出问题，小心。','老嬷嬷用谢问璋的口气教你认这一房那一房的人，话里有话。你听着没接。','下人背后议论新主母年轻，声音不大不小，刚好够你听见。你没回头，走掉了。','有人翻动过你陪嫁的箱笼，东西没少，位置变了。你一件件摆回原处，记下了，什么都没说。','雨下了一整日。这宅子大得很，也安静得很，安静到你有时觉得，住在里面的，只有你一个人。','你在旧账册边角看见一处淡墨批注。字迹温和，落笔却准。谢问璋病中看账，竟比许多活人清醒。','谢问璋的牌位前香烟细细往上。你忽然想起他病中咳得很轻，从不让你久站。','你曾以为他娶你，是谢家无奈的一步棋。如今看他留下的暗线，才知那人病骨之下，心思深得很。','药柜里还留着旧药味。你站了一会儿，忽然想起他对你说过：若不愿管，便别管。那时你没听懂。','谢问璋从未要求你守谢家。可他越是不求，你越难把这座宅子扔下。','你今日穿得很素，却在正堂坐出了满身压人的贵气。衣裳不重要，坐得稳才重要。','有人试探你年轻。你笑着听完，再一句句把他的退路堵死。','你很少动怒。因为怒气太便宜，你更喜欢让人自己跪明白。','你赏人时温和，罚人时也温和。后来下人才知道，夫人最可怕的时候，就是最温和的时候。','你幼时也曾坐在母亲身旁听管事回话。那时只觉得账册枯燥，如今才知道，枯燥的东西最能救命。','家族未败时，母亲常说：会看账的女人，至少不会把命交到别人手里。你那时不懂，如今懂了。','族亲们总觉得你年轻，却忘了你不是从小门小户里慌张嫁来的姑娘。你见过真正的高门，也见过高门一夜倾塌。','你原也有过锦绣门庭。后来门庭塌了，你才知道，人若自己站不稳，金玉铺地也会变成泥。','你不怕族亲的眼色。比起当年满门风雨，这些闲话不过是廊下冷风。','母亲病中醒来，曾握着你的手说，谢问璋是个可托之人。你那时只记得感激，如今才慢慢懂得“可托”二字有多重。'],'mid':['布庄掌柜送来新账，字迹比上月工整了许多。','顾行简的帖子压在案上，纸角带着淡淡茶香。','祠堂的灯亮到三更，没人敢问你在等什么。','商会送来的帖子堆了半案，你一封封翻过去，不动声色。','谢临舟不是不懂家事，只是从前没人肯让他插手内宅。你递给他一册外账，他看了一夜。','谢听澜病着，却记得每一房管事的来历。他说得轻，你听得很重。','沈砚重新排了夜巡。你看完那张图，知道这宅子从前能撑住，不是没有原因。','谢家旧仆里仍有肯做事的人。只是这些年主位空得太久，他们也学会了沉默。','族亲里也并非人人坏。有个老叔公悄悄送来旧契，只说：别让谢家散了。','你看着满院灯火，忽然觉得这也不是个烂摊子。','你把账册摊开，才发现谢家的商路断了三条，仍有两条暗线能走。病中人，果然早留了后手。','今日布庄老掌柜跪下，说愿再替谢家跑一趟南货。他腿脚不好，眼神却亮。','谢临舟把一份族中名册放到你案上。没有多话，但每个名字后都批了利害。','沈砚夜里换了岗，第二日后院少了两个不该出现的人。','你忽然明白，谢家从来不是没人能用，只是他们都在等一个敢点名的人。','这座宅子太大了，大到藏得住蛀虫，也藏得住忠心。','有人说谢家气数尽了。你低头看账，觉得气数这种东西，有时候也能重新算。','你算账算到半夜，院子里突然响起一阵犬吠。你打开门，看到谢临舟站在外头。','今日处置了一件旧年烂账，手段不甚漂亮，但结果干净。你没解释，下人也没敢问。','你调停了一桩事，说话时用了一句连自己都不知道从哪儿学来的话——那是谢问璋说话的语气。你没想到自己已经会这种话了。','顾行简今日谈账谈到一半，说谢夫人素着也好看，只是不该这么便宜旁人眼睛。你没接这句话，他笑了，自己先把话收了，又重新谈账，像什么都没说过。','账册里有一页先夫批过的边注，红墨已淡，字迹还在：此人可用，但不可深信。那页写的是谁，你今日才摸清楚。他那时已经病着，批这行字的时候，想的大概是你。','谢临舟把一份文书推过来时，手指碰到了你的，没有立刻收回，就那么搭着——一格账册的宽度，他在那头，你在这头，两个人都没有先动。','沈砚送你回院，在廊下说夫人慢走，月色不好。你进了门，等了一会儿，廊外才传来他转身离开的声音。','祠堂的灯亮到三更。没人敢问你在等什么。等账清，等人跪，等谢家重新活。','商会帖子堆了半案，每一封都像试探。你一封封翻过去，像翻一群人的底牌。','节下各房来送礼，礼单你看得比谁都细。送轻送重，都是态度。','管事递上新拟的下人名册。划掉的几个名字，是你昨夜定的。今早无人敢问。','城里开始有人称你一声谢夫人，称得不情不愿，但到底称了。','有媒人来探口风，被你不软不硬堵了回去。这宅子的门，你还没打算给谁开。','月底盘账，少了一笔，又补上了。补账的人手快，你的眼更快。','你开始懂得谢家为何败。不是没钱，是人人都觉得自己可以从账上拿一点。','族老今日没笑。你发现他们不笑的时候，脸上皱纹特别像欠条。','茶楼开张后，来喝茶的人多了，来打听你的人更多。茶是热的，话是凉的。','你给一房远亲留了面子，也让他把吞的银子吐了出来。体面，是给活人用的。','谢临舟今日当众替你回了一句话。你没看他，但知道他耳根红了。','谢听澜院里的药味淡了些。他看见你来，先笑，后咳，顺序拿捏得很好。','你听完商会的人讲半个时辰，终于明白：男人谈生意，废话也能算成本。','下人见你抬眼，已经知道该闭嘴。这种默契，你花了不少银钱和威望才买来。','你今日笑得很温和。熟悉你的人都知道，有人要倒霉了。','谢家的牌匾今天被人擦得极亮。你站在阶下看了一会儿，觉得谢问璋留给你的这副烂担子，总算没有砸在手里。','你翻到一页旧账，旁边写着：此处不必急查，急则伤人。你看着那行字，忽然有点想骂他。什么都替你想了，却偏偏不在了。','老仆说，谢问璋病重那几日还问过你的母亲。你沉默很久，感激这种东西，也会长成牵挂。','祠堂夜里很冷。你站在谢问璋的牌位前，说今日谢家又赚了一笔。说完自己都觉得荒唐。','你不知道自己是不是想谢问璋。或许只是这座宅子太重，而最早把重量交给你的人，已经不能回答。','有时你会想，若谢问璋还活着，看见你把谢家管成这样，会不会笑。大约会。','谢临舟今日在外院查了一整日旧籍。回来时袖口沾灰，脸色很冷，却把名册放到了你案上。','谢听澜让人送来一份人名。字迹清秀，旁边批了四个字：此人可用。','顾行简替谢家压下商会一成货价。信上只写一句：谢夫人欠我一盏茶。','沈砚夜里巡到三更，换下两个不稳妥的护院。','谢临舟当众驳了族老一句。那话不重，却刚好替你把场面撑住。','顾行简的船替谢家绕开一处险滩。商人说是顺路，你信他才怪。','沈砚重新立了夜巡规矩。院中下人抱怨少了，脚步却齐了。','从前所有人都站得太散，如今都慢慢朝你这边靠过来。','谢临舟来送外账时，正好撞见顾行简从你书房出来。两人互相看了一眼，谁都没笑。','谢听澜今日多喝了半碗药。原因是你说喝完便去看他。谢临舟听见后，冷着脸把账册翻得哗哗响。','顾行简在茶楼替谢家压下一成货价，回来却听说你去了谢听澜院中。他笑了笑，说药钱也该算进谢家账里。','谢临舟今日在祠堂等你，等到最后，只等来一句“夫人去了二公子院里”。香灰落了一桌。','谢听澜让人送来热茶，正好摆在顾行简的契书旁边。顾行简看了一眼，笑说谢家茶水倒是周到。','你在正堂说话时，谢临舟站在左侧，沈砚站在门边。一个守规矩，一个守门。都很安静，也都很碍眼。','顾行简说商路要紧，谢听澜说夫人夜里该早睡。你看着两人，忽然觉得这座宅子不是事多，是人也多。','沈砚替你拦下一位外客。那人刚说自己是顾少东家的朋友，沈砚便回：“夫人今日不见闲人。”','谢听澜今日咳得比平时重。你问大夫，大夫说无碍。顾行简在旁边轻声道：“这病，倒会挑时候。”','沈砚夜里巡到谢听澜院外，被屋里人请进去喝茶。他没进，只说：“夫人在这里时，我守外头。”','顾行简离开时正碰上谢临舟回府。一个衣上带江风，一个袖上沾香灰。两人都像刚替你办完一件不能说的事。','你今日只是多夸了沈砚一句，晚膳时谢听澜便问护院巡夜辛苦，需要增添人手。语气温柔，听起来却很酸。','沈砚今日换了门房，说是旧人不稳。顾行简进门时被多问了两句，笑得意味深长：“谢夫人的门，如今真难进。”','你在茶楼多留了半个时辰。回府后，谢临舟问账，谢听澜问药，沈砚问路上可安全。没人问你见了谁。','谢听澜看见你袖口沾了水汽，轻飘飘地问，夫人今日见顾少东家了？你没答，他便笑得更乖。','沈砚替你接过顾行简送来的礼。顾行简问他贵姓，沈砚只回：“谢家护院。”那四个字硬得像刀背。','你今日在正堂多留谢临舟说了几句话。晚间谢听澜的药突然苦了些，他说大概是药童配错了。','顾行简说若谢家没人懂船路，他可以日日来教。谢临舟当场回：“谢家不缺先生。”','你发现他们其实都很懂分寸。只是每个人都把分寸守在不同地方，守着守着，就把你围住了。','你幼时也曾坐在母亲身旁听管事回话。那时只觉得账册枯燥，如今才知道，枯燥的东西最能救命。','家族未败时，母亲常说：会看账的女人，至少不会把命交到别人手里。你那时不懂，如今懂了。','族亲们总觉得你年轻，却忘了你不是从小门小户里慌张嫁来的姑娘。你见过真正的高门，也见过高门一夜倾塌。','你原也有过锦绣门庭。后来门庭塌了，你才知道，人若自己站不稳，金玉铺地也会变成泥。','你不怕族亲的眼色。比起当年满门风雨，这些闲话不过是廊下冷风。','母亲病中醒来，曾握着你的手说，谢问璋是个可托之人。你那时只记得感激，如今才慢慢懂得“可托”二字有多重。','若不是那场家变，你与谢问璋或许一生都不会这样相逢。命运真会挑时候，把恩情、婚约和未说出口的心思都搅在一处。','药柜里旧药味还在。你站了一会儿，想起谢问璋病中笑过一次，说谢家规矩重，若你嫌烦，便不必全听。那时你只当他宽慰你。','账册翻到最后一页，你忽然想起刚过门那几日。谢问璋总是坐在屏风后，一边低咳，一边静静听你盘算谢家的进项。','夜雨声烦。你想起成亲那天，谢问璋没让你行完繁文缛节，只隔着盖头轻声说了一句：“到了谢家，就不必怕了。”','你在谢问璋的书房里翻到一幅只画了一半的丹青。画上的人背影极像你，墨迹却在裙摆处颤抖而断。','谢问璋的旧衣被你命人妥善收在箱底。你偶尔会想，若他能多撑上一年半载，你和他，到底会走到哪一步？','你手腕上常戴着一只不起眼的玉镯。那是你母族倾覆前定好的物件，后来被谢问璋花重金从黑市赎回，在新婚夜默默放在了你枕边。'],'late':['府文书走得顺了些。陆怀瑾没有署名，但你知道是谁打过招呼。','陆怀瑾坐在对面等你看完文书，你抬眼，他在看你。他没有立刻移开，慢了一拍才移，那一拍你都看见了，他自己也知道你看见了。','陆怀瑾的官轿停在侧门，没有惊动旁人。','谢临舟替你拦住了第三拨族亲。他没说什么，只是站着，就够了。','你到最后也没分清，对谢问璋究竟是绝境逢生的感激，还是未及挑明的心动。他将最干脆的生杀大权和去留自由交给你，然后再没给你寻找答案的机会。','你坐在堂上很久，下人添了三回灯油。','你只在堂上轻轻皱了皱眉，几十个管事便齐齐噤声。如今的玉堂，你就是规矩。','往年的旧账被一把火烧得干净。谢家这棵老树朽了的根，已经被你全数拔起，重新种在了自己的院子里。','大雪封门，祠堂里的香火却旺。你给谢问璋上了一炷香，烟气缭绕里，你终于能坦然地说上一句：两不相欠。','你看着账本上惊人的数目，恍惚间想起刚嫁进谢家时那个破败的庭院。这满堂春色，是你亲手锁住的。','门房来报说外头有人递帖。身旁的人未发一言，只静静地替你理平了袖口的褶皱，那拜帖便再没能递到你面前。','夜雨声烦，你在账册上落下最后一笔。一旁研墨的人停了手，低声问：“夫人如今，连天下商路都握在手里了，还有什么想要的吗？”','你随手摘下鬓边的玉簪搁在案上。不过半日，那玉簪便不见了。你没问是谁拿的，只知道那人大概夜里又睡不安稳了。','看着账本上那一串长得数不清的零，你忽然想不起刚嫁进来时那种战战兢兢的滋味了。岁月不败搞钱人，古人诚不欺我。','满城都在传谢夫人手段通天，是个吃人不吐骨头的黑心寡妇。你坐在堆满金条的私库里，觉得这名声悦耳极了。','你只在堂上轻轻皱了皱眉，底下站着的几十个管事立刻跪了一地，连呼吸都不敢用力。','当年的旧账彻底翻篇，旧人也死了个干净。这谢家的天，这半座城的规矩，现在全跟着你的心情变。','那人半跪在你膝前替你换鞋。粗糙的指腹刻意放轻了力道，擦过你敏感的脚踝时，带起一阵让人头皮发麻的战栗。','如今城里的媒婆连谢家方圆二里的地界都不敢踏足。所有人都心照不宣：谢家这朵最艳的牡丹，早就被一群恶狼死死圈在自己的领地里了。','你靠在引枕上小憩，半梦半醒间，感觉有人在细细把玩你垂落的长发。动作极尽温存，眼神却偏执得像要将你生吞活剥。','账房递来的账一页都不敢错了，错一页的那个人上个月已经不在了。这宅子太安静，你有时候不知道算不算好事。','你有时候觉得，谢问璋把这宅子留给你，未必全是信任。也许只是，他不知道还能把你放在哪里。这个念头你没有告诉任何人，后来想想，这也是一种体贴。','族亲来的次数少了，怕的不只是你的位分，是你的眼睛。你察觉这件事是在某次族会上，你说了一句话，满堂的人都往后坐了一点。','夜里你梦见嫁进来那天。那顶轿子沉得很，你手心都是汗。谢问璋来掀轿帘，什么也没说，只是给了你一下眼神——你在那个眼神里看见了很多东西，当时不懂，现在大概懂了。','谢问璋的旧印压在账册旁，像一个迟来的答案，也像一个一开始就设好的局。你有时想，如果能见他一面，想问他，你算准了什么，没算准什么——然后又想，算了，他也许真的会答，你未必想听。','灯下你想起嫁进来那天，那时只想着欠了一份恩，还了就好。没想到还的方式是这样，变成这样的人，坐在这里，一宅的灯都为你亮着。','你坐在堂上很久，下人添了三回灯油，没人敢问你累不累。做主母不能说累，说了他们会当你快倒。','城里说谢家这两年活过来了。没人提是谁把它从死里拖回来的。你不急，账上都记着。','夜里你梦见嫁进来那天，醒来时天还没亮。你没有再睡，起来看账。','一桩旧事被人翻出来，又被你压了回去，轻得像它从没存在过。','满宅的人都在等你一句话。你迟迟没说。让他们等，也是一种话。','你站在祠堂前，先夫牌位落了薄灰。你伸手，又收回。活人太忙，死人先等等。','灯下只剩你一个人。这座宅子从没像今日这样彻底是你的，也从没这样重。','下人把主母两个字说得越来越顺。顺得你有时想起，自己原本不该在这里。','顾行简送来的新契很厚，厚得像一摞温柔的陷阱。','陆怀瑾的官印盖在文书上。你看着那一点朱红，忽然想起年少时他的手也这样稳。','沈砚守在门外，影子落进屋里。你不必回头，也知道他在。','商会的人终于不再称你“谢家寡妇”。他们称你“谢夫人”，尾音里带着怕。','玉堂灯亮了一整夜。你没睡，谢家也没睡。赚钱养家，主打一个全宅陪跑。','你想起先夫那句“若你愿守”。如今你终于明白，守不是忍，是把所有门都握在手里。','族老今日说你手段太硬。你点头，说谢家的账更硬。','有年轻丫鬟偷偷学你走路。你看见了，没拆穿。总有人要知道女人也能这样走进正堂。','你把一份新契压在谢问璋的旧印旁。一个死去的人留下开局，一个活着的人继续落子。','谢问璋给了你名分，也给了你退路。世上许多人只会给枷锁，还要你感恩。','你不爱欠人。可谢问璋这笔账，越还越深。','亡夫二字太冷。谢问璋这个名字，却在一页页旧账里慢慢热起来。','你把一桩烂账拆成三处人情、两处旧怨、一处贪心。拆完之后，所有人都安静了。','你今日没有戴重钗。可你走进正堂时，众人仍像听见金玉撞响。','你看人的时候很慢，慢得像在给对方留体面，也像在等对方自己露馅。','有人说你手腕太硬。你笑了笑。软手腕撑不起大宅，硬手腕才端得稳茶。','你从不急着证明自己。因为真正掌权的人，不用每句话都说给别人听。','若不是那场家变，你与谢问璋或许一生都不会这样相逢。命运真会挑时候，把恩情、婚约和未说出口的心思都搅在一处。','药柜里旧药味还在。你站了一会儿，想起他病中笑过一次，说谢家规矩重，若你嫌烦，便不必全听。那时你只当他宽慰你。','你明明坐在灯下，却像坐在棋局正中。每个人说话前，都先看一眼你的脸色。','陆怀瑾的文书刚送到侧门，沈砚便亲自去接了。回来时他说“无事”，可那封文书的封口完好得过分。','陆怀瑾在正堂与你议事，沈砚一直站在门外。你没叫他进来，他也没走。','顾行简送来的新契上压着一枚玉扣。陆怀瑾看见时，指尖停了一瞬，什么都没问。','陆怀瑾今日没有进门，只站在侧门外。谢临舟远远看见，回头问你：“夫人要见客吗？”','陆怀瑾离开时，沈砚送到门外。两人都没说话，可门外风像突然冷了一点。','这宅子从前空得像要散。如今倒好，正堂、侧门、廊下、药房、书房，处处都有人等你。','陆怀瑾说官府近来风紧，让你少见商会的人。顾行简听见后只笑：“陆大人管得倒宽。”','顾行简说你该多出门看商路，陆怀瑾说外头风声未平，谢临舟说内宅还有事。你忽然很想把他们都派去盘账。','谢临舟递账册，顾行简递契书，陆怀瑾递文书，谢听澜递药方。你看着案上四样东西，觉得自己像被全城公文围攻。','陆怀瑾递来的文书被谢临舟先看了一眼。你没阻止。陆怀瑾也没介意，只是看你的时间更久了。','谢临舟和陆怀瑾同在正堂，一个说族规，一个说律例。你听了半盏茶，觉得他们若去吵架，谢家能省一笔讼费。','陆怀瑾没有进门，只让人送来一封空白文书。空白处，正好够你填谢家想说的话。','你幼时也曾坐在母亲身旁听管事回话。那时只觉得账册枯燥，如今才知道，枯燥的东西最能救命。','家族未败时，母亲常说：会看账的女人，至少不会把命交到别人手里。你那时不懂，如今懂了。','族亲们总觉得你年轻，却忘了你不是从小门小户里慌张嫁来的姑娘。你见过真正的高门，也见过高门一夜倾塌。','你原也有过锦绣门庭。后来门庭塌了，你才知道，人若自己站不稳，金玉铺地也会变成泥。','你不怕族亲的眼色。比起当年满门风雨，这些闲话不过是廊下冷风。','母亲病中醒来，曾握着你的手说，谢问璋是个可托之人。你那时只记得感激，如今才慢慢懂得“可托”二字有多重。','若不是那场家变，你与谢问璋或许一生都不会这样相逢。命运真会挑时候，把恩情、婚约和未说出口的心思都搅在一处。','药柜里旧药味还在。你站了一会儿，想起谢问璋病中笑过一次，说谢家规矩重，若你嫌烦，便不必全听。那时你只当他宽慰你。','账册翻到最后一页，你忽然想起刚过门那几日。谢问璋总是坐在屏风后，一边低咳，一边静静听你盘算谢家的进项。','夜雨声烦。你想起成亲那天，谢问璋没让你行完繁文缛节，只隔着盖头轻声说了一句：“到了谢家，就不必怕了。”','你在谢问璋的书房里翻到一幅只画了一半的丹青。画上的人背影极像你，墨迹却在裙摆处颤抖而断。','谢问璋的旧衣被你命人妥善收在箱底。你偶尔会想，若他能多撑上一年半载，你和他，到底会走到哪一步？','你手腕上常戴着一只不起眼的玉镯。那是你母族倾覆前定好的物件，后来被谢问璋花重金从黑市赎回，在新婚夜默默放在了你枕边。']};vmw_4a9930['RLOG']=RLOG;globalThis['RLOG']=vmw_4a9930['RLOG'];vmw_4a9930['RLOG']=RLOG;globalThis['RLOG']=RLOG;delete vmw_4a9930['_$hrgVOG']['RLOG'];const CROSS_LOG=['正堂今日坐得很满。谢临舟在左，顾行简在右，陆怀瑾隔着文书看你，沈砚守在门边。谢听澜没来，只送来一盏热茶。你看着这阵仗，忽然觉得谢家挺有出息，就是出息得有点挤。','你只是咳了一声，五个人的反应各不相同：谢临舟皱眉，谢听澜递药，顾行简笑着让人传大夫，陆怀瑾问旧疾，沈砚已经出门。','顾行简说生意不能拖，陆怀瑾说官府文书也不能拖。谢临舟看向你：“夫人先看家事。”谢听澜在旁边轻声道：“夫人先歇一会儿。”','你今日难得没有出门。结果来送账的、送药的、送契的、送文书的、送刀伤药的，一个都没少。','谢临舟与顾行简争一条商路的处置，陆怀瑾在旁边补律例，谢听澜轻轻咳了一声，沈砚把门关上。你忽然有种在开五方会审的错觉。','谢听澜说屋里冷，顾行简说茶楼暖，陆怀瑾说官署备了车，谢临舟说夫人哪里都不必去。沈砚没有说话，只把披风递到你手边。','你随口说了句头疼。半个时辰后，热茶、药方、安神香、轻车、护卫全到了。谢家如今不缺人手，缺的是你分身。','顾行简给你送来一批南珠。谢临舟看了一眼，说太艳；陆怀瑾说太贵重；谢听澜说夫人戴什么都好；沈砚说已经验过。','你在正堂坐得太久，几个人轮番找理由让你歇息。你忽然明白，掌权之后最难的不是没人管，是人人都想管你。','陆怀瑾提起旧年一场雪，顾行简立刻问谢家今年雪货如何，谢临舟说内宅不谈旧事。谢听澜笑了一声，屋里更冷了。','谢临舟看不惯顾行简散漫，顾行简看不惯谢临舟端着，陆怀瑾看不惯他们离你太近，沈砚看谁都像风险。谢听澜最温柔，他全记下了。','你把今日事务分给他们。谢临舟管族亲，顾行简管商路，陆怀瑾管文书，沈砚管安防，谢听澜管你有没有按时吃饭。最后一项最难逃。','谢家从前是风雨飘摇，如今是另一种风雨飘摇。区别在于，从前没人撑伞，如今伞太多，差点打起来。','夜里玉堂灯亮着。有人在前院等你，有人在后门守你，有人在茶楼算你，有人在官署护你，有人在病榻边念你。你终于明白，归心也会很吵。'];vmw_4a9930['CROSS_LOG']=CROSS_LOG;globalThis['CROSS_LOG']=vmw_4a9930['CROSS_LOG'];vmw_4a9930['CROSS_LOG']=CROSS_LOG;globalThis['CROSS_LOG']=CROSS_LOG;delete vmw_4a9930['_$hrgVOG']['CROSS_LOG'];const RLOG_FX=[{'t':'你处置一桩家务利落干脆，下人间悄悄传开，没人再敢糊弄。','w':0x50},{'t':'族中一位老者难得当众称你一句“有章法”。','w':0x14,'q':0x1},{'t':'屋脊塌了一角，修缮花去不少银钱。','y':-0x64},{'t':'一房远亲上门哭穷。你没冷脸，贴了些银子，面子上总要过得去。','y':-0x32,'q':0x1},{'t':'下人里出了个偷嘴的，你罚得不轻不重，背后却起了怨言。','w':0xa,'q':-0x1},{'t':'中秋设宴，宾客尽欢，开销也着实不小。','y':-0xc8,'q':0x1},{'t':'城中老商贾看在谢问璋的面上，主动让出了南街的两间旺铺。你没推辞。','y':0x96,'q':0x1},{'t':'夜里你梦见了谢问璋，梦里他还是那副病骨支离的样子，却笑着将一把伞递进你手里。醒来时，郁结全无。','x':-0x3},{'t':'族里有个长辈喝醉了，骂你鸠占鹊巢。你直接将谢问璋生前的佩剑砸在他脚边，全场死寂。','w':0x3c,'q':-0x1,'x':0x1},{'t':'你动了些见不得光的手段压下一桩丑闻。事平了，但夜里难免多梦。','w':0x32,'x':0x1},{'t':'库房采买的账对不上。你发落了两个管事，后院一时间人人自危。','w':0x28,'x':0x1},{'t':'你出面替两房远亲调停了争产的烂摊子，谢家主母的名声又稳了几分。','w':0x32,'q':0x1},{'t':'管事盘出一笔早年漏记的旧银，悄悄呈到你手上。你看着他，心想：看来谢家不是没钱，是钱都长了腿。','y':0x50},{'t':'城南绸缎庄东家慕名送来年礼，礼单厚得像在求你别查旧账。','y':0xdc},{'t':'夜里你又翻出那本对不上的账。谢家全员下班，只有你一个人还在给祖宗填坑。','x':0x1},{'t':'你打点了官面上一回人情。银子花出去，风声果然小了。权力真贵，按两算。','y':-0x140,'q':0x1},{'t':'你借中馈便利，悄悄替自己留了一笔活钱。人可以有情义，但不能没有退路。','y':0x118,'x':0x1},{'t':'绣坊今日多赶出一批货，绣娘们累得眼睛发红。你加了赏钱，账面仍旧好看。','y':0x104,'w':0x32},{'t':'你亲自查了厨房采买，省下的银子足够全宅吃三日。厨房管事的脸色也够你看三日。','y':0xa0,'w':0x3c},{'t':'族中有人背后说你太会算计。你听见了，觉得这是夸奖。','w':0x50},{'t':'你今日没发火，只把某位管事晾在廊下两个时辰。威望这种东西，晒一晒也会涨。','w':0x5a},{'t':'谢家一日进项终于盖过支出。你看着账册，差点想给自己发月银。','y':0x1f4,'w':0x50},{'t':'一笔旧债追回来了。债主哭得很难看，你笑得很体面。','y':0x2bc,'w':0x64},{'t':'你替族中小辈安排了差事，既堵住嘴，也省了月例。','y':0x78,'w':0x5a},{'t':'后院有人传你冷血。你听完只问：传话的人月钱领了吗？当晚流言少了一半。','w':0x78,'x':0x1},{'t':'商会送来试探价，你回得比他们更低。对方沉默了。你喜欢这种沉默。','y':0x258,'w':0x50},{'t':'今日没有出事。你难得觉得奇怪。谢家安静的时候，反而像在憋大的。','x':0x1},{'t':'城南绸缎庄东家慕名送来年礼。你不缺礼，但缺这顺水推舟的交情。','y':0x50},{'t':'二房的远亲上门打秋风。你没冷脸，赏了点碎银把人打发了。','y':-0x1e,'q':0x1},{'t':'前院屋脊塌了一角，修缮走的是公中账目，银子花得如流水。','y':-0x64},{'t':'官面上需要打点的年节礼重了些。银子花出去了，事办得很妥帖。','y':-0x78,'q':0x1},{'t':'一桩家务被你处置得利落干脆，下人间悄悄传开，再没人敢糊弄。','w':0x28},{'t':'你将偷嘴的婆子重打十板赶了出去。立了威，但也难免惹人腹诽。','w':0x1e,'q':-0x1},{'t':'族中一位刻薄的长辈，今日当众咽下了你定的规矩，没敢反驳。','w':0x3c,'q':0x1},{'t':'你动了些见不得光的手段压下一桩丑闻。事是平了，你独自坐了一会儿。','w':0x46,'x':0x1},{'t':'你出面替两房远亲调停了争产的烂摊子，谢家主母的名声稳了几分。','w':0x32,'q':0x1},{'t':'夜里你又翻出那本藏着腌臜的旧账，谁也没问，自己不动声色地咽了下去。','x':-0x1},{'t':'谢问璋从前布下的一颗暗子，今日终于对你低了头。你这步棋，走活了。','w':0x1e,'x':-0x1},{'t':'你驳了族里要重修祠堂的折子。省了钱，却也惹来几句背后的酸话。','y':0x32,'q':-0x1},{'t':'偏院有个嘴碎的丫鬟四处编排你的旧事。你听罢没做声，只扣了那个院的炭火。','w':0x14,'q':-0x1},{'t':'你今日看了四本账、见了三拨管事、听了两场哭穷。主母这差事，竟连告假都没人批。','w':0x46,'x':0x1},{'t':'账房先生说这笔账“历来如此”。你笑了。所有用“历来如此”遮羞的人，通常都欠查。','w':0x5a,'q':0x1},{'t':'你盯着采买单看了半晌，忽然觉得白菜若真这么贵，谢家不如改种白菜。','y':0x78},{'t':'族亲们一边喝谢家的茶，一边劝你交权。你忽然明白，最贵的开销不是修宅，是养闲人。','w':0x64,'x':0x1},{'t':'你今日没有发火，只是把三位管事留下加算旧账。大家一起熬夜，宅门感情果然更深了。','w':0x50},{'t':'铺面终于有了盈余。你看着账册，第一次产生了给自己发月银的冲动。','y':0x15e,'w':0x28},{'t':'谢家一日的杂事从清晨排到入夜。你怀疑谢问璋不是娶妻，是给谢家找了个全年无休的掌柜。','x':-0x1,'w':0x32},{'t':'你把亏损铺面的掌柜叫来问话。他说天时不好。你问他是不是一年四季都逆天而行。','w':0x5a},{'t':'你处理完一场族中争执，喝了半盏冷茶。做人主母，真是端着体面，干着苦差。','w':0x3c,'x':-0x1},{'t':'你算完账，发现自己若是开馆教人持家，谢家上下都该交束脩。','y':0xb4},{'t':'你让厨房减了虚报采买，饭菜反而好吃了。看来谢家以前不是没钱，是钱被油水泡胀了。','y':0xdc,'w':0x3c},{'t':'族里几个子弟在书院惹了事。你没骂，只让人停了他们半年的份例。外头都说谢家新主母治家极严。','w':0x1e,'q':0x1},{'t':'城中有些关于谢家的流言还没起势，便被你派人无声无息地按灭了。','w':0x28,'q':0x1},{'t':'二公子院里大半夜叫了回大夫。次日外头便传继母苛待原配病子，你听完连眉头都没动一下。','q':-0x1},{'t':'某位男客的马车在谢家侧门停得久了些。门房虽然嘴严，但邻街的眼线总是避不开的。','q':-0x1},{'t':'你用家法发落了一个倚老卖老的管事。院子安静了，但“刻薄寡恩”的评语也悄悄传出了墙外。','w':0x3c,'q':-0x1},{'t':'理旧籍时，你发现先夫当年结下的几个政敌，如今正手握大权。这谢家，真是一脚踩在悬崖上。','x':0x1},{'t':'夜里忽然下了暴雨。你听着雨打窗纸的声音，不知怎么，总觉得这雨里藏着还没露面的刀子。','x':0x1},{'t':'有人在堂上议事时盯了你很久。你知道那绝不是什么安分的眼神，所以才更觉得头疼。','x':0x1},{'t':'你今日只靠半盏浓茶撑着看了四个时辰的账。谢家还没倒，你觉得自己快先倒了。','x':0x1},{'t':'今日核完最后一笔账，天刚好放晴。你靠在引枕上睡了半个时辰，没有做梦。','x':-0x1},{'t':'你偶然翻出一盒压在箱底的旧香，味道很像成亲前在家常用的那种。点上后，紧绷的肩颈终于松了些。','x':-0x1},{'t':'一只不知哪来的野狸奴在你廊下睡了半日。你没让人赶它，就这么看着，心弦忽然松了一瞬。','x':-0x1},{'t':'难得今日无人来正堂回话。你什么都没做，只是安静地喝完了一整壶茶。','x':-0x1},{'t':'为了圆上公中的一笔大亏空，你连着熬了三个大夜。账平了，名声保住了，你却连拿笔的手都在发抖。','q':0x1,'x':0x1},{'t':'你今日心烦，直接称病免了所有管事的晨昏定省。外头传你恃宠生骄，你却难得睡了个好觉。','q':-0x1,'x':-0x1},{'t':'你亲手将一个犯了错的远亲送去了官府。大义灭亲的名声极好听，可同族人看你的眼神越发疏远了。','w':0x32,'q':0x1,'x':0x1},{'t':'面对几家商行的联手刁难，你当众掀了桌子。规矩虽然难看，但堵在胸口的那口恶气总算出了。','w':0x50,'q':-0x1,'x':-0x1}];vmw_4a9930['RLOG_FX']=RLOG_FX;globalThis['RLOG_FX']=vmw_4a9930['RLOG_FX'];vmw_4a9930['RLOG_FX']=RLOG_FX;globalThis['RLOG_FX']=RLOG_FX;delete vmw_4a9930['_$hrgVOG']['RLOG_FX'];const MLOG={'lin':[['账册掉落，谢临舟弯腰捡起搁在案角，连个称呼都吝啬给。','议事时谢临舟始终站着，没有坐下，也没有看你。','谢临舟对下人比对你和气。这一点他自己大概都没察觉。','族里有人当众挤兑你，谢临舟站在旁边，没有落井下石，也没有帮你。','你向谢临舟问安，他还了礼。礼数挑不出错，眼底也挑不出半分温度。','你说要查旧账，谢临舟冷笑一声。很好，有情绪就说明还有得治。','你坐在谢临舟母亲旧日的位置上。他看你一眼，那一眼像刀，也像伤。','谢临舟不叫你母亲，也不叫夫人，只称一句“你”。旁人变了脸，你没变。','你让谢临舟坐，他没坐。你笑着说：“站着听也行。”他眉心动了一下。'],['议事时谢临舟不再打断你了，虽然脸还是冷的。','族里有人当众落你面子，谢临舟淡淡接了一句，把人噎得脸色发青。','谢临舟把管事递错的账册推回你手边，低声说：“这里错了。”','你训人时谢临舟在旁边听，听到最后忽然笑了一下。很浅，浅得像错觉。','你问他是不是不服。谢临舟沉默片刻，说：“夫人若做错，我自然不服。”你说：“那你最好盯紧些。”','谢临舟第一次没有避开你的目光。那一瞬，你发现他的不服里也有好奇。','族老指责你越权，谢临舟站出来，只说一句：“父亲临终托的是她。”满堂都静了。','席间有人借酒生事，谢临舟不动声色地拿过酒盏，替你挡了那一杯。','你刚从谢听澜院中出来，谢临舟便在廊下等着。你问他等多久了，他说：“不久。”肩上却落了薄露。','谢临舟在正堂留你议事，谢听澜让人送来了热茶，茶盏下压着纸条：夜深，别累着。'],['你在核账，谢临舟站在门口，不进来也不走。','谢临舟替你理了一下被风吹乱的鬓发，做完自己先愣了一下。','大雨倾盆，谢临舟撑伞送你回院，伞骨大半偏向你，自己半边肩头全湿了。','你在核账，谢临舟就站在门槛外，不进来，也迟迟没有离开。','你提醒谢临舟逾矩了，谢临舟沉默许久，只低声回了一句“我知道”，却依旧没挪步。','他站在你身后替你看账，影子压下来。你没有回头，只说：“大公子，太近了。”他停了一瞬，没退。','谢临舟说，从前是我看错你。说完不等你回话就走了，耳根是红的。','你叫他临舟，他眼神沉下去。你又慢慢补了一句“大公子”，他反而更不高兴。','你说谢临舟越界。他垂眼看着你的袖口：“夫人若真要罚，我认。”','沈砚替你撑灯，谢临舟看见了，没说什么。第二日外院巡夜规矩多了三条。','谢临舟不问你今天见了谁，只是在你回来后把今日所有事都摊到案前，让你不得不多留一会儿。','谢听澜差人来请你时，谢临舟正替你批账。他笔尖停了停，墨滴落在纸上，有一点失控。','谢临舟冷着脸看你从谢听澜房间出来，你故意问他是不是介意。他冷着脸说，我介意的是谢家规矩。你笑了，他没再辩。'],['谢临舟把你案上最难处置的文书抽走，扔下一句“交给我”，没有商量的余地。','谢临舟夜里从你院中出来，沈砚站在廊下。两人对视片刻，谁也没问谁为何在这里。','你夜里咳了两声，次日谢临舟案上便多了一张开给城中名医的条子。','谢临舟替你扣回主母印的铜扣，指尖停在你腕上。太近了，近到礼法都要装瞎。','你说这条路不好走，谢临舟说，他知道。你问他怕不怕，他看着你说，他怕你一个人走。','谢临舟从不说什么。可每一次你回头，他都站在最容易被人误会的位置。','族亲走后，谢临舟替你收起主印。指尖擦过你的手背，很轻。轻到不能问罪，重到不能忘。','雨夜里谢临舟替你撑伞，你故意走慢半步。他也跟着慢。你们谁都没有拆穿。','谢临舟低声说你不该一个人撑。你笑问，那你替我？他看着你，很久才答，不可以吗？','谢临舟不该在你院中久留。你知道，他也知道。可夜色太深，规矩像一张薄纸。','你在正堂训人，谢临舟站在你身侧。旁人看的是你的威严，他看的是你微微发白的指尖。','你故意叫谢临舟大公子，他眉眼冷了些。再叫临舟，他又低声应了。你发现这人其实很好拿捏。','深夜你让谢临舟回去，他没有动。过了许久，他才说，夫人让我走，是规矩，还是心虚？','你靠在椅背上闭眼片刻，醒来时披风在肩上。谢临舟坐在不远处，手里还拿着未批完的账。','有人说谢临舟如今太听你的话。他只回一句，谢家的话，原就该听她的。','你说谢临舟逾矩。他低头看你，声音压得很低，夫人如今才知道？','谢临舟在祠堂前与你并肩站着。你们谁也没有碰谁，可那一刻，连牌位前的香烟都像乱了。','谢临舟不争你的夜，也不争你的旧情。他只守着正堂的位置，像守着最后一层不能明说的名分。','谢临舟替你撑伞时，沈砚站在雨外。雨水顺着刀鞘往下滴，他没有动。']],'lan':[['谢听澜咳得很轻，咳完抬眼，对你笑一下，不冷不热。','谢听澜差人送来一碗清粥，附一句母亲胃寒，落款是工整的小楷。','谢听澜的这双眼睛温顺垂着，看向你时却深得不太像个晚辈。','谢听澜病着，话不多，可你说的每句话他都听进去了。','谢听澜病着，话不多，可你说的每句话他都听进去了。病人有时最会听人心。','你走过谢听澜院外，窗内的人影停了一瞬。你没回头，也知道他在看。','谢听澜递来的药方夹着一页旧账。你看着他，他垂眼笑道，只是顺手。'],['谢听澜在病榻上替你点出旧账里被人换过的印鉴，你发现他其实什么都知道，只是从前没人问。','谢听澜把屋里的丫鬟全支开，才肯和你说几句真话。','你夜里查账，谢听澜让人送来热茶。茶下压着一张纸条，写着一个不该出现的名字。','谢听澜低声提醒你别信某房的人，说完又咳，像只是随口。','你问谢听澜为何帮你。他笑了回，这宅子里，只有你不把他当废人。','谢听澜把手炉推给你，自己指尖却凉得发白。你看他一眼，他便乖乖收回手。','谢听澜病中坐起替你指账，衣襟松了些。你移开目光，他轻轻笑了一声。','你对谢听澜说，你本不必卷进来。他说，他已经在这宅子里，怎么能不卷进来？','外头有人来回事，你准备起身，谢听澜握住你的手腕，轻声说：让他们等一等。声音很温顺，手没有松，你想了想，对外头说稍候。他低下眼睛，嘴角弯了一点，是那种你越来越认识的表情。'],['谢听澜说今晚不困，问你能不能多坐一会儿。窗外月色很好。','谢听澜靠在引枕上看你，看得太久，你回看他，他也不躲。','谢听澜咳嗽时你扶他，他顺势把额头抵在你肩上，没有起来。','谢听澜握住你的袖角，力气很轻，却没有松开。轻得像请求，牢得像圈套。','你替谢听澜掖被角，他忽然握住你的手腕。病人的手很凉，眼神却热。','谢听澜说“母亲”二字时停了一下，像自己也觉得这称呼碍事。','你起身要走，谢听澜垂眼说，原来夫人对谁都这样好。这话酸得不像病人。','你问谢听澜想要什么，他笑得很乖，夫人忙完了，来他这里坐一会儿。','谢听澜从不争正堂的位置。他只争你离开正堂后的那一点时间。','谢听澜把一份旧账压在枕下，只给你看。你俯身去取时，他呼吸忽然乱了。','你问谢听澜是不是不高兴。他笑：“我有什么资格不高兴？”难哄。','谢听澜院里留你太久，沈砚没有催，只把夜巡绕到那条廊下第三次。','谢听澜问你，若是他和旁人说了同一件事，你会先听谁的。你说看什么事，他想了想，说：那就是都听。'],['谢听澜闭着眼说，今晚别走。声音轻得像怕惊动谁。','谢听澜把头靠在你膝边，气息很浅。你低头时，他在笑。','谢听澜病中握住你的手腕，力气轻得像风。可你抽了一下，竟没抽出来。','你替谢听澜试药温，他看着你的指尖，半晌没眨眼。药还没凉，人先静了。','谢听澜低声唤你母亲，尾音却轻得不像称呼，像故意把一根线绕上来。','你说谢听澜越来越会装可怜。他笑得温顺，说，那有用吗？','谢听澜说病人夜里容易冷。你看着屋里三只手炉，觉得这话十分不诚实。','你问谢听澜想要什么。他答，夫人看他一会儿就好。','你说谢听澜病好了就不许再装。他笑得温柔：“那夫人还会来看我吗？”','谢听澜榻边总留着一盏灯。你问为何不灭，他说怕你夜里来时看不清路。','你起身要走，谢听澜没有拦，只轻轻咳了一声。你停下，他便垂眼笑了。','谢听澜唤你夫人时极少，偶尔唤一次，尾音比那声母亲更轻，也更危险。','谢听澜靠在你肩上，声音低低的：“我不争他们白日里的位置。夜里这一会儿，给我。”','谢听澜说，夫人若今晚还要去议事，先来他这里把药喝了。你问谁喝。他看着你笑：“都喝。”']],'gu':[['顾行简看你账册的眼神，像在看一桩快赔光的买卖。','顾行简端着茶进来，见你坐在主位，茶杯顿了一下才落下。','顾行简报数目报得飞快，眼睛却没离开过你的手。','顾行简合上折扇，懒洋洋地问，谢夫人，这买卖你做得了主吗？','顾行简笑你年轻，你笑他算盘打得响。第一回合，谁都没讨到便宜。','顾行简把契书推来，纸面干净，坑埋得漂亮。你看完只说，重写。','商人最会看人。顾行简看你三次，第三次终于没把你当寡妇看。','顾行简送来的礼摆在桌上，谢听澜看了一眼说，商人惯会讨人喜欢。语气温柔得像糖里藏针。'],['船货出事顾行简没趁机压价，反把新契推给你：这回我赌你赢。','顾行简把一条没人敢走的商路指给你，没要好处，只笑。','顾行简难得正经了一瞬，说这局你别怕，有我。','顾行简这次主动签了字，签完说，谢夫人比上月更狠了。语气像亏了，眼神像赚了。','顾行简说商人无利不起早，但又说今日起得早，是想见夫人。','顾行简看你骂掌柜，看得津津有味。末了点评：“比我骂得好听。”','你把账推回去，指出三处暗坑。顾行简安静片刻，笑意终于到眼底。','谢临舟看见顾行简从你书房出来，神色没变，只把手里的账册放得重了些。','你说顾行简有用。谢临舟沉默片刻，说：“谢家的人，也有用。”','谢听澜听说你今日见了顾公子，晚药便多剩了半碗。你看着他，他乖乖喝完，眼里却还委屈着。','顾行简听说谢临舟替你挡了族亲，笑着说：“大公子终于知道自己该站哪边了？”','你从谢听澜院里出来，顾行简闻到了你袖上药香，笑道：“谢夫人这生意，连药香都算成本？”','顾行简说，你这里最近人来人往的，不知道的还以为开了茶楼。说完瞥了一眼廊外的沈砚，把折扇收了，什么都没再说。','你提了顾行简一句，说他那条商路走得很漂亮，谢临舟翻了一页账册，过了一会儿，说：那条路，谢家自己也能走。','你夸陆怀瑾稳妥，顾行简轻轻敲了敲契书：“稳妥可赚不了大钱，谢夫人。”'],['顾行简说今天的风像江上的，又说江上的风看腻了，唯独你没看腻。','谈完正事顾行简迟迟不走，硬是在你案前多坐了半个时辰，话题越扯越远。','顾行简忽然凑近了些，带着江风的冷香逼近，低声问你怕不怕顾某人。','顾行简把茶杯放在你手边，指尖在你手背上蹭了一下，若无其事。','顾行简凑近，看着你的眼睛问：“怕过我吗？”你说：“怕你算错账。”','谈完正事顾行简也不走，多坐了半个时辰，话题越扯越远，距离也越扯越近。','顾行简替你拂去袖口墨痕，指尖停得太久：“你若不是谢家主母——”后半句没说。','顾行简替你拂去袖口墨痕，指腹擦过腕骨。动作像无意，眼神一点都不像。','你让顾行简坐远些，他笑：“夫人谈价时可没嫌我近。”','顾行简把一枚银锞子在指间转着玩，忽然搁到你掌心：“压个彩头，赌我会不会栽在你手里。”','你说顾行简胆子太大。他回：“夫人胆子若小，早被这宅子吃了。”','你说顾行简今日靠得太近。他退了半寸，笑问：“这样，夫人能继续谈价了吗？”','沈砚拦他入内时，顾行简也不恼，只笑：“你守门，我送钱，各有用处。”','你问他是不是故意来得这么勤。他笑：“若我不勤些，谢夫人案上哪还有我的位置？”','顾行简进门时，沈砚多看了他一眼。顾行简笑问：“护院也管查账？”沈砚回：“查人。”'],['顾行简把半城商路摊在你案上，散漫地笑：“利归你，险归我。”','顾行简终于承认，有些账算到最后不是利，是人。','你问顾行简图什么。他撑着下巴看你：“图谢夫人哪天也为我亏一笔。”','顾行简说商人最忌讳动心。说完又笑：“可惜我学艺不精。”','顾行简谈价时靠得太近，你把账册横在中间。他看了一眼，笑说：“谢夫人防我，还是防自己？”','顾行简把契书推回去，他伸手来接，指尖从你指边擦过。两人都没有收得太快。','顾行简说你像一笔很难算的账。你问他算清了吗？他笑：“还差一点，想多看几日。”','顾行简把银票压在你手边，不急着松手。你抬眼，他才笑着放开。','你问顾行简为何总押你赢。他说：“因为看夫人赢，比赚钱有意思。”','顾行简凑近看你批字，说你的手很稳。你说商人不该盯这个。他答：“我今日不是来做商人的。”','你笑着砍价，顾行简笑着认输。旁人以为你们在谈生意，只有你知道他眼神早就偏了。','顾行简离开时回头看你，折扇点了点案上新契：“这张是生意。下一张，未必。”','顾行简谈完也正事不走，指尖有一下没一下敲着你的账册。你问他还要什么，他说：“账谈完了，该谈私事。”','你砍了顾行简三成利，他笑得比赚了还高兴，谢夫人肯同我算这么细，便是不拿他当外人。','顾行简把银票压在你掌心，指尖不急着撤。你抬眼，他笑：“谢夫人总要给我一点甜头。”','商会有人问顾行简为何替谢家做到这个地步。他答：“我乐意亏。”这三个字从商人口中说出来，比情话还可怕。','顾行简送来新契，封口没有火漆，只压着一枚玉扣。你看他，他说：“生意归生意，这个归你。”','顾行简看你收拾族亲，笑得肩都颤了。你问他笑什么，他说：“看夫人赢，比看银钱入账好。”']],'lu':[['陆怀瑾凝视你的时间远比开口说话的时间长，随后又像被烫到一般移开视线。','陆怀瑾递文书时唤了你的小名，出口才低声改成谢夫人。','陆怀瑾在偏厅等了整整一刻钟。你出来时他低头行礼，话没多。','陆怀瑾递文书的手指有点抖。你装作没看见，他装作没抖。','陆怀瑾看你的时间比说话的时间长，然后自己先移开了视线。','陆怀瑾带来的官差态度很恭敬。你知道，那不是谢家的面子。','你说多年不见，陆怀瑾回：“是。”一个字像压了十年。','陆怀瑾叫你谢夫人时总慢半拍。那半拍里，藏着另一个名字。','陆怀瑾的官轿停在侧门时，顾行简也正好上门谈契。两人隔着半座庭院点了点头，礼数很足。','谢临舟在正堂等你时，陆怀瑾便停在侧门外，没有进去。','陆怀瑾来时，沈砚照例送到侧门。两人话不多，却各自把对方打量了一遍。'],['陆怀瑾把一桩旧案卷压在你案上，说：“这次我不会再晚。”','陆怀瑾没用谢夫人那三个字，叫的是别的。叫完两人都没说话。','你问陆怀瑾图什么，他低声说，图他终于能有点用。','你让陆怀瑾别为你破例。他笑了一下：“我若当年能破例，就好了。”','雨里陆怀瑾送你到门口，只差一步就能越过门槛。他停住了。','陆怀瑾送来的文书压在案上，谢临舟扫了一眼，问：“官府的事，需要夫人亲自见他？”','谢临舟听见陆怀瑾唤你的乳名，眼神冷了一瞬。你看过去，他已经低头翻账。','你提起陆怀瑾，谢听澜笑得很温顺：“旧人总是好的。”说完咳了一声，咳得很会挑时候。','陆怀瑾看见顾行简送来的新契，沉默片刻，只问这人可信？你说可信。他低低应了一声。','沈砚送陆怀瑾出门，两人一路无话。临走前他回头看你，沈砚也回头看你。'],['你们隔着一盏灯坐着，谁都没提从前。可陆怀瑾看你的眼神，从未走远。','陆怀瑾送你出门，走到一半停下，说前面路滑，没有再往前。','陆怀瑾握住你的手，又很快放开，像怕烫着，又像怕自己不肯放。','陆怀瑾说当年那句话他记了十年，说完别过脸去。','你问陆怀瑾后不后悔。他说：“后悔没用，所以我来了。”','陆怀瑾替你披上一件斗篷，动作克制到几乎冷淡，指尖却碰得很轻。','你说陆怀瑾如今是官，不该管谢家私事。他说，他管的不是谢家，是你。”','陆怀瑾低声念你的乳名。很轻。轻得像怕这座宅子听见。','陆怀瑾送来的旧发簪被你收进匣中。他看见了，笑意淡了一点：“谢夫人原来也会收不赚钱的东西。”','你说顾行简今日帮了大忙。陆怀瑾笑了笑：“他有他的用处。”话说得大度，眼神却不大度。','谢临舟唤你夫人时，顾行简垂下了眼。那两个字，他也能叫，却不能像那样叫。','你问陆怀瑾是不是介意。他说：“介意。”答得太诚实，反倒让你怔住。','陆怀瑾看见你案上压着顾行简的玉扣，轻声道：“夫人如今收东西，眼光很好。”','谢听澜差人请你时，顾行简将文书收好，说你先去吧。你走出两步，听见他又轻轻补了一句：“我等着。”','你提起顾行简说的某句话，觉得很有道理，陆怀瑾嗯了一声，过了一会儿，说：他说话向来好听。'],['陆怀瑾把那枚发簪还给你：“它本来就该是你的，我也是。”','陆怀瑾终于不躲你的目光了。十年的话，都在那一眼里。','陆怀瑾替你挡下一桩官司，自己被上峰申斥。回来时只说：“小事。”','陆怀瑾说不会带你走。你在哪里，他就守在哪里。','陆怀瑾替你披上斗篷，手指避得很规矩。可越是规矩，越像把什么东西压到了骨头里。','你们隔着一盏灯坐着，灯火把陆怀瑾的影子推到你裙边。谁都没动。','陆怀瑾唤你谢夫人时太慢，慢得像每次都要从乳名上绕过去。','你问陆怀瑾还记得从前吗。他没有答，只把那枚旧发簪放到你掌心。','雨声太大，陆怀瑾送你到檐下。再往前一步就越界。他停住，你也停住。','陆怀瑾低声说：“如果我当年有今日的能力……”你打断他：“没有如果。”他看着你，眼睛红了一点。','你说陆怀瑾不该为你破例。他回：“我已经守了太多年规矩。”','陆怀瑾把文书递给你，指尖碰到你的手，又极快收回。像迟来的少年，还没学会从容。','你问陆怀瑾是否还怨自己来晚。他看着你：“我如今不晚，就够了。”','雨夜里陆怀瑾送来文书，衣袖湿透，却不肯进门。你说进来避雨，他低声道：“我怕进来后不想走。”','陆怀瑾替你披上斗篷，手指避得很规矩。可越是规矩，越像心虚。','你和陆怀瑾隔着一盏灯坐着。灯火把他的影子推到你裙边，谁都没有动。','陆怀瑾偶尔仍会唤你的乳名。每一次都很轻，像把少年时没说完的话悄悄还给你。','你问陆怀瑾守在门外苦不苦。他说，比当年站在门外什么也做不了，好得多。','陆怀瑾把官印压在文书上，又将文书推给你。那一刻，他像把自己能给的一切都递了过来。','你说陆怀瑾太克制。他垂眼笑了一下：“我若不克制，夫人今日还肯见我吗？”']],'shen':[['沈砚在阶下站岗，从你出门到回来，没挪过位置。','你赏沈砚银子，他没接，只说分内事。','沈砚回话从不多一个字。问一句，答一句，多问一句，沉默一句。','先夫在时沈砚听先夫的。如今他改听你的，没有一刻迟疑。','沈砚看人时眼神很平，像在判断对方几招能倒。','你从廊下经过，沈砚微微垂眼。不是避，是守规矩。','有人在你身后靠近，沈砚的手已经落到刀柄上。那人立刻离远了。','你问沈砚怕不怕。他说：“怕夫人出事。”这话直得你一时没接住。'],['你让沈砚退下，他迟疑了一瞬，还是退了，但走得很慢。','沈砚把巡夜的路线报给你，等你点头才走。','沈砚守在你必经的廊下，像是顺路是。','后院进了贼，沈砚守了一夜。天亮立在阶下，衣上有血，不是他的。','你问沈砚伤在哪，他说没有。你看着袖口那点血，他终于低头。','有下人冲撞你，沈砚只往前一步，那人就跪了。'],['沈砚守夜时离你的窗很近。你咳一声，灯影里那道身形立刻直了。','沈砚替你挡了那一下。事后你问伤，他说不碍事，袖子没敢抬。','沈砚把佩刀解下搁在门边才进屋回话。','你让沈砚坐，他不坐。你说这是命令，他终于坐了半边椅子，像受刑。','沈砚从不看你太久。可每次你转身，都能感觉到那道视线落回来。','你问沈砚是不是只会听令。他沉默很久，说：“夫人若不令，我也会守。”','沈砚替你关门时，指节擦过门框。你站在门内，他站在门外，都没有动。','你问沈砚是不是不喜欢他们。他答：“夫人喜欢的，属下不敢不敬。”停了一瞬，又说：“但属下会看着。”'],['沈砚单膝跪下，说这条命本是夫人的。说得很轻，像在说天气。','沈砚说，只要他还站着，没人能近你的身。然后真的，没人近得了。','你回头，沈砚总在。回头多少次，他都在。','沈砚不说那个字。可他守你的样子，比谁说出来都重。','你回头，沈砚总在。回头多少次，他都在。','沈砚不说那个字。可他守你的样子，比谁说出来都重。','你问沈砚若有一日不必守谢家了，还守不守你。他答得很快：“守。”','沈砚站在你身后，存在感低得像影子。可影子有时比人可靠。','沈砚终于抬眼看你。那眼神太直，像一把出鞘后又硬生生按回去的刀。','他站在你身后三步，不远不近。你往前，他往前；你停，他也停。像影子有了刀。','你让沈砚抬头。他抬了。那一眼太直，你反而先移开目光。','沈砚替你挡住廊下风口，自己衣摆被雨打湿。你问冷不冷，他说不冷，声音很低。','你替沈砚包扎伤口，他全程没动。只有你指尖碰到他腕骨时，他呼吸乱了一下。','沈砚进屋前解刀，出屋时忘了拿。你提醒他，他低头道：“在夫人这里，用不上。”','你问沈砚为何总守着。他答：“老爷命我护谢家。”你看着他，他又补一句：“如今是护夫人。”','沈砚跪得太稳，像把自己也交成了一件物什。你不喜欢，叫他起来。他这次听了。','夜巡回来，沈砚身上带着冷气。你递了盏热茶，他捧着很久，像不敢喝。','他从不争白日里的位置。可夜深后，守在你门外的人，只会是他。']]};vmw_4a9930['MLOG']=MLOG;globalThis['MLOG']=vmw_4a9930['MLOG'];vmw_4a9930['MLOG']=MLOG;globalThis['MLOG']=MLOG;delete vmw_4a9930['_$hrgVOG']['MLOG'];const TALK={'lin':[['谢临舟听你说话，眼神在别处。你说到第三句时，他终于看了过来。','谢临舟点头便走，走到门口又停了一瞬。算了，也算进步。','你递茶谢临舟没接，自己倒了一盏。你笑了一下，他手顿了顿。','谢临舟说夫人不必同我解释。你回：不是解释，是吩咐。'],['谢临舟今天没有避开你的目光。','谢临舟递来一本自己批过的旧账。','谢临舟主动问你近来可好。语气硬得像审案，内容却很软。','你问谢临舟是不是在关心你。他板着脸说：“谢家不能乱。”'],['谢临舟站在你身后很久，没说话。','谢临舟的手碰到你袖口，没有立刻收回。','他低声说了句什么，你没听清。他不肯再说，耳根却红了。','你叫他临舟，他沉默很久，回了一声夫人。声音低得不像话。']],'lan':[['谢听澜抬眼看你，笑了一下，眼睛温温的，像知道你总会心软。','谢听澜咳着说母亲不必每日来问。你说那明日不来，他立刻不咳了。','谢听澜把药放一边，先和你说话。','你问谢听澜今日可好，他说见到夫人便好些。话说得乖，眼神一点不乖。'],['谢听澜的手凉凉地落在你手腕上。你没抽开，他轻轻地笑了。','谢听澜说你来了我才喝药。','谢听澜第一次没让丫鬟在屋里伺候。','你问谢听澜还瞒了你什么。他说，夫人想听哪一种？'],['谢听澜闭着眼说，今晚不要走。','谢听澜把头靠在你膝边，没有声音。','谢听澜说留下来，明天再回去也好。','你说谢听澜越来越会留人。他笑：夫人教得好。']],'gu':[['顾行简笑着喝完一盏茶，没谈生意。你知道这比谈生意更危险。','顾行简翻你的账册，啧了一声。','顾行简斜靠着看你，像在估价。你看回去，像在验货。','你把顾行简的报价砍掉一半，他看着你笑得莫名其妙。'],['顾行简把茶杯放你手边，指尖蹭过你的手背，轻得像一笔坏账。','顾行简说今日的风像江上的。你说江风贵吗？他笑得肩都颤了。','顾行简没急着走，多坐了半个时辰。茶续了三回，正事一句没提。','你问顾行简是不是太闲。他说：忙着看夫人算计人。'],['顾行简笑着说你这一手比他更像商人。','顾行简凑近一点问怕了吗。你说怕他挡光。他真的退了一寸。','顾行简说谢家这局，他陪你押到底。你问输呢？他说那就陪你赖账。','顾行简看你收账，眼神比看银票还亮。你提醒他收敛，他说收不住。']],'lu':[['陆怀瑾递文书礼数周全，多余的话一句没有。可文书角落，夹着你爱用的旧花笺。','陆怀瑾叫你谢夫人，叫得很慢。慢到你听见另一个名字停在舌尖。','陆怀瑾在门外站了会儿才进来。你知道他不是犹豫公事。','你问陆怀瑾多年不见可好。他答得很稳，眼神却闪了一下。'],['陆怀瑾这次没用谢夫人三个字。你们都装作没有听见。','陆怀瑾替你拦下一封难听文书，回头却只说顺手。','陆怀瑾在你案前坐了很久，没说话。沉默有时候比旧情更吵。','你说陆怀瑾如今有官身，不该为你冒险。他回：我从前不能，如今终于可以。'],['陆怀瑾说从前来不及，现在他守在外头。你没有看他，手却停了。','陆怀瑾握住你的手，又放开。快得像守礼，慢得像舍不得。','陆怀瑾低声说，你不必再嫁我，我也在。你听完许久没有回话。','你问陆怀瑾还记不记得从前。他说，不敢忘，也忘不掉。']],'shen':[['沈砚把巡夜的路线报给你，等你点头。','沈砚抱拳行礼，半句多话都没有。你忽然很想逼他说第三句。','你问他累不累，他说习惯了。你说这习惯不好，他终于抬眼。','他站得像刀。你叫他近些，他迟疑一瞬，真的近了一步。'],['沈砚站得离你更近了一些，像在防什么。也像终于找到了理由。','沈砚把佩刀解下来搁在门边，才进屋回话。','沈砚说夫人若怕，今夜他守在廊下。你问若不怕呢？他说也守。'],['沈砚单膝跪着不肯起，说这是他该的。','沈砚回答的很轻：夫人的命，先于他的。','沈砚说只要他还站着，没人能近你的身。','你伸手替他理了袖口的血痕。他僵住，像比挨刀还难受。']]};vmw_4a9930['TALK']=TALK;globalThis['TALK']=vmw_4a9930['TALK'];vmw_4a9930['TALK']=TALK;globalThis['TALK']=TALK;delete vmw_4a9930['_$hrgVOG']['TALK'];const EVS=[{'id':'e_liwei','ul':0x2,'p':0.35, ],['_$KxGlhT']:undefined},undefined,undefined,this);}},{'l':'烧掉它，转身离府','d':'不问归期，不问前程','req':j=>{return vmB_ff303f(0x68,[j],{['_$XUgn7l']:[hasFlag],['_$KxGlhT']:undefined},undefined,undefined,this);},'fn':j=>{'use\x20strict';return vmB_ff303f(0x69,[j],{['_$XUgn7l']:[finalJudge],['_$KxGlhT']:undefined},undefined,undefined,this);}}]},{'id':'e_final','ul':0x8,'p':0.7,'gap':0xb4,'every':![],'title':'玉堂落笔','req':j=>{return vmB_ff303f(0x6a,[j],{['_$XUgn7l']:[canFinal],['_$KxGlhT']:undefined},undefined,undefined,this);},'desc':'玉堂灯亮了一整夜。族亲、掌柜、官府、商会的人都在门外。这座宅子活过来了，于是所有人都想重新分它。案前放着主母印、总账、亡夫遗书，还有几封未拆的帖子。他们都在等你一句话。','opts':[{'l':'开正门，请众人入堂','d':'谢家的账，今日一并清了','fn':j=>{'use\x20strict';return vmB_ff303f(0x6b,[j],{['_$XUgn7l']:[finalJudge],['_$KxGlhT']:undefined},undefined,undefined,this);}},{'l':'让他们站到你身边','d':'不是你一个人在守这座宅子','req':j=>{return vmB_ff303f(0x6c,[j],{['_$XUgn7l']:[countMenPhase],['_$KxGlhT']:undefined},undefined,undefined,this);},'fn':j=>{'use\x20strict';return vmB_ff303f(0x6d,[j],{['_$XUgn7l']:[finalJudge,unlockAch],['_$KxGlhT']:undefined},undefined,undefined,this);}},{'l':'烧掉旧契，另立新规','d':'旧恩旧账，到此为止','req':j=>{return vmB_ff303f(0x6e,[j],{['_$XUgn7l']:[hasFlag],['_$KxGlhT']:undefined},undefined,undefined,this);},'fn':j=>{'use\x20strict';return vmB_ff303f(0x6f,[j],{['_$XUgn7l']:[finalJudge],['_$KxGlhT']:undefined},undefined,undefined,this);}}]}];vmw_4a9930['EVS']=EVS;globalThis['EVS']=vmw_4a9930['EVS'];vmw_4a9930['EVS']=EVS;globalThis['EVS']=EVS;delete vmw_4a9930['_$hrgVOG']['EVS'];const ENDS={'zhenjie':{'cls':'good','ti':'一宅之主','sub':'玉\x20堂\x20长\x20明','txt':'玉堂的灯破晓未熄。族亲在阶下垂手，管事在门外候账，官府的红契落了印。谢临舟替你镇住宗祠，谢听澜在廊下为你留灯，顾行简将半城商路推到你手边，陆怀瑾为你挡下朝堂风雪，沈砚的刀鞘敛于你身后三步。谢问璋留下的不是枷锁，是一场他来不及走完的局。如今你替他走完了，也替自己赢下了。从此再没有人问，谢家的当家是谁。','ach':'a_zhen'},'qunxiang':{'cls':'good','ti':'玉堂春深','sub':'满\x20堂\x20春\x20色','txt':'这座宅子或许未及百年前的鼎盛，可如今廊下有人留灯，账上有金，门前车马喧嚣，堂中再无人敢有半句轻慢。你没有属于谁，他们也不再问你属于谁。他们留下，不是因为谢家，是因为你。','ach':'a_qun'},'lin_g':{'cls':'good','ti':'并\x20\x20辔','sub':'名\x20分\x20之\x20侧','txt':'谢家的账如今分两册，一册对内，一册对外。他管外院，你管内宅，从不越线，也从不问谁高谁低。有时他在你耳侧低唤一声夫人，声音很轻——只有你知道，那一声不是礼数。','ach':'a_one_ge'},'lan_g':{'cls':'good','ti':'长\x20\x20命','sub':'病\x20榻\x20留\x20灯','txt':'大夫说，他的病熬过了最难的几年，往后是好的。他把手心朝上搁在你膝边，眼神比平时清醒：我一开始就知道你会留下来的。你没问他怎么知道。你们都心照不宣——这条命他原本不想要，是你来了之后，他才舍不得断。','ach':'a_one_ge'},'gu_g':{'cls':'good','ti':'甘愿入局','sub':'入\x20\x20港','txt':'顾家最后一趟南下的货船拔锚，他却立在岸上未动。旁人笑他色令智昏，放着大业不管，偏要来蹚谢家的浑水。他听了只笑，说生意做久了，总要有一笔不按算盘来。你问他亏不亏，他把折扇合上，慢悠悠道：若是赔给谢夫人，倒也不算亏。','ach':'a_one_ge'},'lu_g':{'cls':'good','ti':'旧人未迟','sub':'守\x20门\x20外','txt':'陆怀瑾后来很少再提从前。他不再说当年若如何，也不再说要带你离开。你已经不是那个等人来救的姑娘，他也终于不是那个只能站在门外的少年。官印、清名、前程，他一样样押到你这边，隔了十年的那一步，他终于跨了过来，站到了你的身侧。','ach':'a_one_ge'},'shen_g':{'cls':'good','ti':'刀锋认主','sub':'身\x20\x20后','txt':'他在你身后站了一辈子。从不上前半步，也从不退后半步。有人问谢夫人最信得过的是谁，全宅都答不上来——因为那个人从不出声，可他在哪里、他守谁，整座宅子都看得见。','ach':'a_one_ge'},'chumen':{'cls':'free','ti':'出\x20\x20门','sub':'海\x20阔\x20天\x20空','txt':'你把那封信烧在祠堂前。火光很轻，纸灰飞起来时，谁也没有拦你。你守过谢家，救过谢家，也把欠谢问璋的那份恩一点点还到了尽头。可从今以后，你不再用任何人的遗愿解释自己。大门打开时，天色正亮。有人跟上来，有人留在原处替你守着旧宅。你终于明白，离开不是亏欠，留下也不是枷锁。你可以自己选。','ach':'a_chu'},'mantang':{'cls':'bad','ti':'满堂落灯','sub':'孤\x20家\x20寡\x20人','txt':'你终究坐上了最高的位置。主母印还在，账册也在，玉堂的门匾仍旧挂得端正。可堂下没有人了。族亲退远，下人噤声，那些曾在你身边停留过的人，也一个个沉默着离开。你终于把这座宅子握得很紧，紧到再没有谁能靠近。灯一盏盏熄下去，最后一盏，是你自己吹灭的。','ach':'a_mantang'},'zhaifeng':{'cls':'bad','ti':'债主封门','sub':'败\x20\x20尽','txt':'门外的人来得很整齐，账册也带得很整齐。你站在堂上看他们一寸寸把谢家拆走，没有人替你拦下。亏损不是账，是命。','ach':'a_zhai'},'duoyin':{'cls':'bad','ti':'族亲夺印','sub':'失\x20\x20权','txt':'主母印被请走那日，族中长辈说得很体面。他们说你年轻，说你辛苦，说往后不必再操劳。你坐在空下来的正堂里，终于明白：有些人低头，只是在等你跌下去。','ach':'a_yinli'},'mangui':{'cls':'bad','ti':'满宅皆鬼','sub':'夜\x20长\x20梦\x20多','txt':'你赢了。该走的都走了，该怕的都怕了，灯下只剩你一个人翻账册。账册很干净，宅子很安静。你忽然听见廊下有脚步，回头——没人。算计得太多，连风吹过回廊的声音，都成了索命的催符。','ach':'a_man'},'mingfen':{'cls':'bad','ti':'名分难容','sub':'咫\x20尺\x20天\x20涯','txt':'那个雨夜之后，族亲终于抓到了他们想要的把柄。文书写得周全，字字都是门风，句句都是礼法。你没有签，他却先一步按下了手印，把所有责都拦在自己身上。从此他不再叫你夫人，也不再叫你别的。那个雨夜没有说清的话，从此再无机会出口。','ach':'a_lin_b'},'bingta':{'cls':'bad','ti':'病榻留人','sub':'春\x20寒\x20料\x20峭','txt':'他病得越来越重，你却越来越离不开他的院子。出门的次数一年比一年少。最后你看见镜子里的自己，竟和他一样苍白。他用一身病当成你舍不得断的线，将你永远困在这个院子里。','ach':'a_lan_b'},'jinlong':{'cls':'bad','ti':'金笼账册','sub':'金\x20丝\x20笼\x20雀','txt':'你签下了那份新契，以为借到了东风，却不知已走入了他布下的天罗地网。两年后，谢家的商路彻底改姓了顾。他依旧对你千依百顺，只是你再也走不出他打造的那座庭院。那是世上最华丽的网，用金线与恩宠织成，挣不开，便是绞杀你的牢笼。','ach':'a_gu_b'},'jiuqing':{'cls':'bad','ti':'旧情成罪','sub':'清\x20名\x20成\x20灰','txt':'族中长辈拿着那枚旧发簪站在堂上，问你是何时之物。你看了他一眼，没有答。陆怀瑾远远地站着，没有过来。十年前他来不及，十年后他护不住。','ach':'a_lu_b'},'xuezhai':{'cls':'bad','ti':'血\x20\x20债','sub':'夜\x20路\x20难\x20明','txt':'他为你杀了不该杀的人。谢家从此养着一双见不得光的手。你以为你养了一把好刀，其实你也被这把刀拴住了——他不能见光，你也走不出夜里。','ach':'a_shen_b'}};vmw_4a9930['ENDS']=ENDS;globalThis['ENDS']=vmw_4a9930['ENDS'];vmw_4a9930['ENDS']=ENDS;globalThis['ENDS']=ENDS;delete vmw_4a9930['_$hrgVOG']['ENDS'];const ACHS=[{'id':'a_bet_first','nm':'一掷千金','d':'你把银钱推上桌，账房先生差点跪下。'},{'id':'a_bet_loss','nm':'交点学费','d':'没事，谢家家大业大……吧？'},{'id':'a_bet_10','nm':'祖宗显灵','d':'账房先生看着银票，手抖得像见了亡夫显灵。'},{'id':'a_estate_all','nm':'家大业大','d':'一切都是从一间绣坊开始的。'},{'id':'a_zs_300','nm':'命比账硬','d':'你没把谢家熬死，谢家也没把你熬死。'},{'id':'a_duan','nm':'端水大师','d':'只要我不慌，慌的就是他们。'},{'id':'a_chunxing','nm':'春酲未醒','d':'夜里谁是红尘客。'},{'id':'a_xueluo','nm':'雪落谁肩','d':'风雪落下时，有人在你身边。'},{'id':'a_cross','nm':'玉堂同舟','d':'这一局太重，幸好不止你一个人落子。'},{'id':'a_jiuqing_flag','nm':'旧名未改','d':'他还是记得从前怎么叫你。'},{'id':'a_lin_full','nm':'并辔','d':'他在你耳侧轻唤一声夫人。'},{'id':'a_lan_full','nm':'长命','d':'他病了那么久，第一次说还想多活几年。'},{'id':'a_gu_full','nm':'甘愿入局','d':'最会算账的商人，把命本也赔了进来。'},{'id':'a_lu_full','nm':'旧人未迟','d':'隔了十年的那一步，他终于跨了过来。'},{'id':'a_shen_full','nm':'刀锋认主','d':'他把命交给你，从此只做你的刀。'},{'id':'a_all_full','nm':'满宅归心','d':'他们各自留在自己的位置上，也都留在了你这里。'},{'id':'a_yf','nm':'他一直看着','d':'原来从最开始，就有人信你。'},{'id':'a_zhen','nm':'玉堂长明','d':'从此，这座宅子只听你一人落笔。'},{'id':'a_qun','nm':'满堂春色','d':'他们留下，不是因为谢家，是因为你。'},{'id':'a_chu','nm':'海阔天空','d':'烧掉那封信，你终于走出了这座百年囚笼。'},{'id':'a_mantang','nm':'孤家寡人','d':'你坐上了最高的位置，但堂下空无一人。'},{'id':'a_man','nm':'夜长梦多','d':'算计得太多，连风吹过回廊的声音，都成了索命的催符。'},{'id':'a_one_ge','nm':'若水三千','d':'只取一瓢饮。'},{'id':'a_zhai','nm':'大厦将倾','d':'算得透人心的诡谲，终究没填平账册上的千疮百孔。'},{'
